name: panixida-core-platform-smoke

services:
  smoke:
    image: alpine:3.20
    container_name: core-platform-smoke
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    restart: unless-stopped
    environment:
      TZ: "${TZ:-Europe/Moscow}"
    networks:
      - smoke
    labels:
      org.panixida.stack: core-platform
      org.panixida.role: deploy-smoke

networks:
  smoke:
    name: panixida_core_platform_smoke
    driver: bridge
