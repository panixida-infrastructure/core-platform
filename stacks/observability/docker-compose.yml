services:
  grafana:
    image: grafana/grafana-oss:13.0.1
    restart: unless-stopped
    environment:
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_GENERIC_OAUTH_ENABLED: "true"
      GF_AUTH_GENERIC_OAUTH_NAME: Keycloak
      GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP: "true"
      GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: ${GRAFANA_OIDC_CLIENT_SECRET}
      GF_AUTH_GENERIC_OAUTH_SCOPES: openid email profile
      GF_AUTH_GENERIC_OAUTH_AUTH_URL: https://identity.panixida.ru/realms/panixida/protocol/openid-connect/auth
      GF_AUTH_GENERIC_OAUTH_TOKEN_URL: https://identity.panixida.ru/realms/panixida/protocol/openid-connect/token
      GF_AUTH_GENERIC_OAUTH_API_URL: https://identity.panixida.ru/realms/panixida/protocol/openid-connect/userinfo
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      OBSERVABILITY_VM_REMOTE_WRITE_USERNAME: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
      OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.143.0
    restart: unless-stopped
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=30d
      - -httpAuth.username=${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
      - -httpAuth.password=${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
    volumes:
      - victoriametrics_data:/storage
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.victoriametrics-write.rule=Host(`${METRICS_HOST}`) && PathPrefix(`/api/v1/write`)
      - traefik.http.routers.victoriametrics-write.entrypoints=websecure
      - traefik.http.routers.victoriametrics-write.tls=true
      - traefik.http.routers.victoriametrics-write.tls.certresolver=letsencrypt
      - traefik.http.routers.victoriametrics-write.priority=100
      - traefik.http.routers.victoriametrics-write.service=victoriametrics
      - traefik.http.routers.victoriametrics.rule=Host(`${METRICS_HOST}`)
      - traefik.http.routers.victoriametrics.entrypoints=websecure
      - traefik.http.routers.victoriametrics.tls=true
      - traefik.http.routers.victoriametrics.tls.certresolver=letsencrypt
      - traefik.http.routers.victoriametrics.middlewares=sso@docker
      - traefik.http.routers.victoriametrics.service=victoriametrics
      - traefik.http.services.victoriametrics.loadbalancer.server.port=8428

  victorialogs:
    image: victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=14d
      - -httpAuth.username=${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
      - -httpAuth.password=${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
    volumes:
      - victorialogs_data:/storage
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.victorialogs-write.rule=Host(`${LOGS_HOST}`) && PathPrefix(`/insert`)
      - traefik.http.routers.victorialogs-write.entrypoints=websecure
      - traefik.http.routers.victorialogs-write.tls=true
      - traefik.http.routers.victorialogs-write.tls.certresolver=letsencrypt
      - traefik.http.routers.victorialogs-write.priority=100
      - traefik.http.routers.victorialogs-write.service=victorialogs
      - traefik.http.routers.victorialogs.rule=Host(`${LOGS_HOST}`)
      - traefik.http.routers.victorialogs.entrypoints=websecure
      - traefik.http.routers.victorialogs.tls=true
      - traefik.http.routers.victorialogs.tls.certresolver=letsencrypt
      - traefik.http.routers.victorialogs.middlewares=sso@docker
      - traefik.http.routers.victorialogs.service=victorialogs
      - traefik.http.services.victorialogs.loadbalancer.server.port=9428

  victoriatraces:
    image: victoriametrics/victoria-traces:v0.9.0
    restart: unless-stopped
    command:
      - -storageDataPath=/storage
      - -retentionPeriod=14d
    volumes:
      - victoriatraces_data:/storage
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.victoriatraces.rule=Host(`${TRACES_HOST}`)
      - traefik.http.routers.victoriatraces.entrypoints=websecure
      - traefik.http.routers.victoriatraces.tls=true
      - traefik.http.routers.victoriatraces.tls.certresolver=letsencrypt
      - traefik.http.routers.victoriatraces.middlewares=sso@docker
      - traefik.http.services.victoriatraces.loadbalancer.server.port=10428

  vmagent:
    image: victoriametrics/vmagent:v1.143.0
    restart: unless-stopped
    command:
      - -promscrape.config=/etc/vmagent/scrape.yml
      - -remoteWrite.url=http://victoriametrics:8428/api/v1/write
      - -remoteWrite.basicAuth.username=${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
      - -remoteWrite.basicAuth.password=${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - -remoteWrite.tmpDataPath=/vmagentdata
    volumes:
      - ./config/vmagent/scrape.yml:/etc/vmagent/scrape.yml:ro
      - vmagent_data:/vmagentdata
    depends_on:
      - victoriametrics
      - blackbox_exporter
    networks:
      - edge
      - internal

  vmalert:
    image: victoriametrics/vmalert:v1.143.0
    restart: unless-stopped
    command:
      - -rule=/etc/vmalert/rules.yml
      - -datasource.url=http://victoriametrics:8428
      - -datasource.basicAuth.username=${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
      - -datasource.basicAuth.password=${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - -notifier.url=http://alertmanager:9093
    volumes:
      - ./config/vmalert/rules.yml:/etc/vmalert/rules.yml:ro
    depends_on:
      - victoriametrics
      - alertmanager
    networks:
      - internal

  alertmanager:
    image: prom/alertmanager:v0.32.1
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.alertmanager.rule=Host(`${ALERTS_HOST}`)
      - traefik.http.routers.alertmanager.entrypoints=websecure
      - traefik.http.routers.alertmanager.tls=true
      - traefik.http.routers.alertmanager.tls.certresolver=letsencrypt
      - traefik.http.routers.alertmanager.middlewares=sso@docker
      - traefik.http.services.alertmanager.loadbalancer.server.port=9093

  blackbox_exporter:
    image: prom/blackbox-exporter:v0.28.0
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox_exporter/blackbox.yml
    volumes:
      - ./config/blackbox/blackbox.yml:/etc/blackbox_exporter/blackbox.yml:ro
    networks:
      - internal

  otel_collector:
    image: otel/opentelemetry-collector-contrib:0.142.0
    restart: unless-stopped
    command:
      - --config=/etc/otelcol/config.yml
    volumes:
      - ./config/otelcol/config.yml:/etc/otelcol/config.yml:ro
    depends_on:
      - victoriatraces
    networks:
      - internal
    ports:
      - 127.0.0.1:4317:4317
      - 127.0.0.1:4318:4318

volumes:
  grafana_data:
  victoriametrics_data:
  victorialogs_data:
  victoriatraces_data:
  vmagent_data:
  alertmanager_data:

networks:
  edge:
    external: true
    name: core-platform-edge
  internal:
