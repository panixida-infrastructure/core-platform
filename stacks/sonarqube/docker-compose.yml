services:
  sonarqube:
    image: sonarqube:community
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://postgres:5432/sonar
      SONAR_JDBC_USERNAME: ${SONAR_DB_USERNAME}
      SONAR_JDBC_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=core-platform-edge
      - traefik.http.routers.sonarqube.rule=Host(`${SONAR_HOST}`)
      - traefik.http.routers.sonarqube.entrypoints=websecure
      - traefik.http.routers.sonarqube.tls=true
      - traefik.http.routers.sonarqube.tls.certresolver=letsencrypt
      - traefik.http.routers.sonarqube.middlewares=sso@docker
      - traefik.http.services.sonarqube.loadbalancer.server.port=9000

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sonar
      POSTGRES_USER: ${SONAR_DB_USERNAME}
      POSTGRES_PASSWORD: ${SONAR_DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  edge:
    external: true
    name: core-platform-edge
  internal:
