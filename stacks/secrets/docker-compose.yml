services:
  openbao:
    image: openbao/openbao:2.5.4
    restart: unless-stopped
    command:
      - sh
      - -ec
      - |
        cat > /tmp/openbao.hcl <<EOF
        ui = true
        disable_mlock = true
        api_addr = "https://${OPENBAO_HOST}"
        cluster_addr = "http://127.0.0.1:8201"

        listener "tcp" {
          address = "0.0.0.0:8200"
          tls_disable = true
        }

        storage "file" {
          path = "/openbao/file"
        }
        EOF

        exec bao server -config=/tmp/openbao.hcl
    cap_add:
      - IPC_LOCK
    volumes:
      - openbao_data:/openbao/file
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.http.routers.openbao.rule=Host(`${OPENBAO_HOST}`)
      - traefik.http.routers.openbao.entrypoints=websecure
      - traefik.http.routers.openbao.tls=true
      - traefik.http.routers.openbao.tls.certresolver=letsencrypt
      - traefik.http.services.openbao.loadbalancer.server.port=8200

volumes:
  openbao_data:

networks:
  edge:
    external: true
    name: core-platform-edge
