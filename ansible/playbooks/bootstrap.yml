---
- name: Bootstrap infrastructure server
  hosts: core_platform
  become: true
  gather_facts: true

  tasks:
    - name: Install base packages
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - docker.io
          - docker-compose-v2
          - git
          - gnupg
          - python3-apt
        state: present
        update_cache: true

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Add operators to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Create core platform base folder
      ansible.builtin.file:
        path: "{{ core_platform_base_folder }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Check core platform edge network
      ansible.builtin.command: docker network inspect "{{ core_platform_edge_network }}" # noqa command-instead-of-module
      register: core_platform_edge_network_check
      changed_when: false
      failed_when: false

    - name: Create core platform edge network
      ansible.builtin.command: docker network create "{{ core_platform_edge_network }}" # noqa command-instead-of-module
      when: core_platform_edge_network_check.rc != 0
