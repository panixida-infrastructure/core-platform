---
- name: Bootstrap managed server observability agents
  hosts: managed_servers
  become: true
  gather_facts: true

  tasks:
    - name: Select compose command
      ansible.builtin.set_fact:
        managed_agents_compose_command: "{{ 'docker compose' if ansible_distribution_major_version | int >= 22 else 'docker-compose' }}"

    - name: Install managed server prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - docker.io
          - "{{ 'docker-compose-v2' if ansible_distribution_major_version | int >= 22 else 'docker-compose' }}"
          - gnupg
          - python3-apt
        state: present
        update_cache: true

    - name: Enable Docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: Authorize host-specific root SSH key
      ansible.posix.authorized_key:
        user: root
        key: "{{ root_ssh_public_key }}"
        state: present
        manage_dir: true

    - name: Remove non-host root SSH keys
      ansible.posix.authorized_key:
        user: root
        key: "{{ item }}"
        state: absent
      loop: "{{ root_ssh_absent_public_keys | default([]) }}"

    - name: Ensure observability agent folder
      ansible.builtin.file:
        path: "{{ observability_agent_folder }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Render vmagent scrape config
      ansible.builtin.template:
        src: vmagent.yml.j2
        dest: "{{ observability_agent_folder }}/vmagent.yml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart observability agents

    - name: Render observability agent compose file
      ansible.builtin.template:
        src: managed-agents.compose.yml.j2
        dest: "{{ observability_agent_folder }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0600"
      no_log: true
      notify: Restart observability agents

    - name: Pull observability agent images
      ansible.builtin.command: "{{ managed_agents_compose_command }} pull" # noqa command-instead-of-module
      args:
        chdir: "{{ observability_agent_folder }}"
      changed_when: true

    - name: Start observability agents
      ansible.builtin.command: "{{ managed_agents_compose_command }} up -d" # noqa command-instead-of-module
      args:
        chdir: "{{ observability_agent_folder }}"
      changed_when: true

  handlers:
    - name: Restart observability agents
      ansible.builtin.command: "{{ managed_agents_compose_command }} up -d" # noqa command-instead-of-module
      args:
        chdir: "{{ observability_agent_folder }}"
      changed_when: true
