---
- name: Deploy infra Docker Compose stack
  hosts: infra
  become: true
  gather_facts: false

  vars:
    compose_source: "{{ playbook_dir }}/../../compose/docker-compose.yml"
    env_content: |
      TZ={{ infra_timezone }}

  tasks:
    - name: Create infra service folder
      ansible.builtin.file:
        path: "{{ infra_service_folder }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Upload Docker Compose file
      ansible.builtin.copy:
        src: "{{ compose_source }}"
        dest: "{{ infra_service_folder }}/docker-compose.yml"
        owner: root
        group: root
        mode: "0644"

    - name: Upload env file
      ansible.builtin.copy:
        content: "{{ env_content }}"
        dest: "{{ infra_service_folder }}/.env"
        owner: root
        group: root
        mode: "0600"

    - name: Pull images
      ansible.builtin.command:
        cmd: docker compose pull
        chdir: "{{ infra_service_folder }}"
      changed_when: "'Downloaded newer image' in pull_result.stdout or 'Pulling' in pull_result.stdout"
      register: pull_result

    - name: Start stack
      ansible.builtin.command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ infra_service_folder }}"
      changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout"
      register: compose_up

    - name: Prune dangling images
      ansible.builtin.command:
        cmd: docker image prune -f
      changed_when: false
