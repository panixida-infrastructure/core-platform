---
core_platform_base_folder: /opt/core-platform
core_platform_edge_network: core-platform-edge
core_platform_timezone: Europe/Moscow
core_platform_observability_folder: "{{ core_platform_base_folder }}/observability"

core_platform_operator_user: codexvpn
core_platform_operator_uid: 1500
core_platform_operator_ssh_public_key: "{{ lookup('env', 'CODEXVPN_SSH_PUBLIC_KEY') | default('ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIF24IfpOKOfreBxvhsTICQzi/r+qvc0kQX9RIAKKwLfL infrastructure', true) }}"
core_platform_root_ssh_public_key: "{{ lookup('env', 'ROOT_SSH_PUBLIC_KEY') | default(core_platform_operator_ssh_public_key, true) }}"

wireguard_interface_name: wg0
wireguard_interface_address: "{{ lookup('env', 'WIREGUARD_ADDRESS') | default('10.8.0.9/24', true) }}"
wireguard_private_key: "{{ lookup('env', 'WIREGUARD_PRIVATE_KEY') }}"
wireguard_peer_public_key: "{{ lookup('env', 'WIREGUARD_PEER_PUBLIC_KEY') }}"
wireguard_preshared_key: "{{ lookup('env', 'WIREGUARD_PRESHARED_KEY') }}"
wireguard_peer_endpoint: "{{ lookup('env', 'WIREGUARD_ENDPOINT') }}"
wireguard_peer_allowed_ips: "{{ lookup('env', 'WIREGUARD_ALLOWED_IPS') | default('0.0.0.0/0, ::/0', true) }}"
wireguard_persistent_keepalive: "{{ lookup('env', 'WIREGUARD_PERSISTENT_KEEPALIVE') | default('0', true) }}"
wireguard_routed_uid: "{{ core_platform_operator_uid }}"
wireguard_route_table: 51820
wireguard_uid_rule_priority: 900

github_cli_pat: "{{ lookup('env', 'SERVER_GH_PAT') }}"
github_cli_username: "{{ lookup('env', 'SERVER_GH_USER') | default('PANiXiDA', true) }}"
github_cli_auth_users:
  - name: root
    group: root
    home: /root
  - name: "{{ core_platform_operator_user }}"
    group: "{{ core_platform_operator_user }}"
    home: "/home/{{ core_platform_operator_user }}"

docker_users:
  - "{{ core_platform_operator_user }}"

retired_compose_stacks:
  - portainer
  - smoke

observability_agent_folder: /opt/core-platform/agents
observability_node_exporter_image: "{{ lookup('env', 'OBSERVABILITY_NODE_EXPORTER_IMAGE') | default('quay.io/prometheus/node-exporter:v1.11.1', true) }}"
observability_cadvisor_image: "{{ lookup('env', 'OBSERVABILITY_CADVISOR_IMAGE') | default('gcr.io/cadvisor/cadvisor:v0.52.1', true) }}"
observability_vmagent_image: "{{ lookup('env', 'OBSERVABILITY_VMAGENT_IMAGE') | default('victoriametrics/vmagent:v1.143.0', true) }}"
observability_vlagent_image: "{{ lookup('env', 'OBSERVABILITY_VLAGENT_IMAGE') | default('victoriametrics/vlagent:v1.50.0', true) }}"
observability_vm_remote_write_url: "{{ lookup('env', 'OBSERVABILITY_VM_REMOTE_WRITE_URL') | default('https://metrics.panixida.ru/api/v1/write', true) }}"
observability_vm_remote_write_username: "{{ lookup('env', 'OBSERVABILITY_VM_REMOTE_WRITE_USERNAME') }}"
observability_vm_remote_write_password: "{{ lookup('env', 'OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD') }}"
observability_logs_remote_write_url: "{{ lookup('env', 'OBSERVABILITY_LOGS_REMOTE_WRITE_URL') | default('https://logs.panixida.ru/insert/native', true) }}"
observability_logs_remote_write_username: "{{ lookup('env', 'OBSERVABILITY_LOGS_REMOTE_WRITE_USERNAME') | default(observability_vm_remote_write_username, true) }}"
observability_logs_remote_write_password: "{{ lookup('env', 'OBSERVABILITY_LOGS_REMOTE_WRITE_PASSWORD') | default(observability_vm_remote_write_password, true) }}"
observability_timeweb_dbaas_exporter_host: "{{ lookup('env', 'OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_HOST') | default('dbs-exporter.timeweb.cloud', true) }}"
observability_timeweb_dbaas_exporter_id: "{{ lookup('env', 'OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_ID') }}"
observability_timeweb_dbaas_exporter_username: "{{ lookup('env', 'OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_USERNAME') }}"
observability_timeweb_dbaas_exporter_password: "{{ lookup('env', 'OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_PASSWORD') }}"
