name: Deploy

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to deploy
        required: true
        type: choice
        default: edge
        options:
          - edge
          - identity
          - identity-sso
          - secrets
          - komodo
          - observability
          - sonarqube

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: core-platform-deploy-production
  cancel-in-progress: false

jobs:
  edge:
    if: inputs.stack == 'edge'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh edge

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/edge

          compose-file: stacks/edge/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            TRAEFIK_ACME_EMAIL=${{ vars.TRAEFIK_ACME_EMAIL }}
            TRAEFIK_DASHBOARD_HOST=traefik.panixida.ru
            OAUTH2_PROXY_HOST=auth.panixida.ru
            OAUTH2_PROXY_CLIENT_ID=panixida-edge
            OAUTH2_PROXY_CLIENT_SECRET=${{ steps.openbao.outputs.OAUTH2_PROXY_CLIENT_SECRET }}
            OAUTH2_PROXY_COOKIE_SECRET=${{ steps.openbao.outputs.OAUTH2_PROXY_COOKIE_SECRET }}
            SSO_OIDC_ISSUER_URL=https://identity.panixida.ru/realms/panixida

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  identity:
    if: inputs.stack == 'identity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh identity

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/identity

          compose-file: stacks/identity/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            KEYCLOAK_HOST=identity.panixida.ru
            KEYCLOAK_DB_HOST=${{ steps.openbao.outputs.KEYCLOAK_DB_HOST }}
            KEYCLOAK_DB_PORT=${{ steps.openbao.outputs.KEYCLOAK_DB_PORT }}
            KEYCLOAK_DB_NAME=${{ steps.openbao.outputs.KEYCLOAK_DB_NAME }}
            KEYCLOAK_DB_USERNAME=${{ steps.openbao.outputs.KEYCLOAK_DB_USERNAME }}
            KEYCLOAK_DB_PASSWORD=${{ steps.openbao.outputs.KEYCLOAK_DB_PASSWORD }}
            KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME=${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME }}
            KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD=${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  secrets:
    if: inputs.stack == 'secrets'
    runs-on: ubuntu-latest
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/secrets

          compose-file: stacks/secrets/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            OPENBAO_HOST=secrets.panixida.ru

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

      - name: Unseal OpenBao
        env:
          OPENBAO_ADDR: https://secrets.panixida.ru
          OPENBAO_UNSEAL_KEY: ${{ secrets.OPENBAO_UNSEAL_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENBAO_UNSEAL_KEY:-}" ]; then
            echo "::error::OPENBAO_UNSEAL_KEY is required to unseal OpenBao after redeploy"
            exit 1
          fi

          for _ in $(seq 1 40); do
            status="$(curl -fsS -o /tmp/openbao-health.json -w '%{http_code}' "${OPENBAO_ADDR}/v1/sys/health" || true)"
            if [ "$status" = "200" ]; then
              exit 0
            fi
            if [ "$status" = "503" ]; then
              payload="$(jq -nc --arg key "$OPENBAO_UNSEAL_KEY" '{key: $key}')"
              curl -fsS -X POST -H "Content-Type: application/json" -d "$payload" "${OPENBAO_ADDR}/v1/sys/unseal" >/tmp/openbao-unseal.json
              if [ "$(jq -r '.sealed' /tmp/openbao-unseal.json)" = "false" ]; then
                exit 0
              fi
            fi
            sleep 3
          done

          cat /tmp/openbao-health.json
          exit 1

  komodo:
    if: inputs.stack == 'komodo'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh komodo

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/komodo

          compose-file: stacks/komodo/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            COMPOSE_KOMODO_IMAGE_TAG=2
            KOMODO_HOSTNAME=komodo.panixida.ru
            KOMODO_HOST=https://komodo.panixida.ru
            KOMODO_TITLE=Panixida Komodo
            KOMODO_LOCAL_AUTH=true
            KOMODO_INIT_ADMIN_USERNAME=${{ steps.openbao.outputs.KOMODO_INIT_ADMIN_USERNAME }}
            KOMODO_INIT_ADMIN_PASSWORD=${{ steps.openbao.outputs.KOMODO_INIT_ADMIN_PASSWORD }}
            KOMODO_DISABLE_USER_REGISTRATION=true
            KOMODO_ENABLE_NEW_USERS=false
            KOMODO_DATABASE_USERNAME=${{ steps.openbao.outputs.KOMODO_DATABASE_USERNAME }}
            KOMODO_DATABASE_PASSWORD=${{ steps.openbao.outputs.KOMODO_DATABASE_PASSWORD }}
            KOMODO_WEBHOOK_SECRET=${{ steps.openbao.outputs.KOMODO_WEBHOOK_SECRET }}
            KOMODO_JWT_SECRET=${{ steps.openbao.outputs.KOMODO_JWT_SECRET }}
            KOMODO_FIRST_SERVER_NAME=infrastructure
            PERIPHERY_CORE_ADDRESS=ws://core:9120
            PERIPHERY_CONNECT_AS=infrastructure
            PERIPHERY_CORE_PUBLIC_KEYS=file:/config/keys/core.pub
            PERIPHERY_ROOT_DIRECTORY=/opt/core-platform
            PERIPHERY_DISABLE_TERMINALS=false
            PERIPHERY_DISABLE_CONTAINER_TERMINALS=false
            PERIPHERY_INCLUDE_DISK_MOUNTS=/etc/hostname
            KOMODO_OIDC_ENABLED=${{ vars.KOMODO_OIDC_ENABLED }}
            KOMODO_OIDC_PROVIDER=${{ vars.KOMODO_OIDC_PROVIDER }}
            KOMODO_OIDC_CLIENT_ID=${{ vars.KOMODO_OIDC_CLIENT_ID }}
            KOMODO_OIDC_CLIENT_SECRET=${{ steps.openbao.outputs.KOMODO_OIDC_CLIENT_SECRET }}
            KOMODO_OIDC_USE_FULL_EMAIL=true
            KOMODO_OIDC_AUTO_REDIRECT=true

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  observability:
    if: inputs.stack == 'observability'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh observability

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/observability

          compose-file: stacks/observability/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            GRAFANA_HOST=grafana.panixida.ru
            METRICS_HOST=metrics.panixida.ru
            LOGS_HOST=logs.panixida.ru
            TRACES_HOST=traces.panixida.ru
            ALERTS_HOST=alerts.panixida.ru
            GRAFANA_DB_HOST=${{ steps.openbao.outputs.GRAFANA_DB_HOST }}
            GRAFANA_DB_PORT=${{ steps.openbao.outputs.GRAFANA_DB_PORT }}
            GRAFANA_DB_NAME=${{ steps.openbao.outputs.GRAFANA_DB_NAME }}
            GRAFANA_DB_USERNAME=${{ steps.openbao.outputs.GRAFANA_DB_USERNAME }}
            GRAFANA_DB_PASSWORD=${{ steps.openbao.outputs.GRAFANA_DB_PASSWORD }}
            GRAFANA_ADMIN_USER=${{ steps.openbao.outputs.GRAFANA_ADMIN_USER }}
            GRAFANA_ADMIN_PASSWORD=${{ steps.openbao.outputs.GRAFANA_ADMIN_PASSWORD }}
            GRAFANA_OIDC_CLIENT_SECRET=${{ steps.openbao.outputs.GRAFANA_OIDC_CLIENT_SECRET }}
            OBSERVABILITY_VM_REMOTE_WRITE_USERNAME=${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_USERNAME }}
            OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD=${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  sonarqube:
    if: inputs.stack == 'sonarqube'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh sonarqube

      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/sonarqube

          compose-file: stacks/sonarqube/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            SONAR_HOST=sonar.panixida.ru
            SONAR_DB_HOST=${{ steps.openbao.outputs.SONAR_DB_HOST }}
            SONAR_DB_PORT=${{ steps.openbao.outputs.SONAR_DB_PORT }}
            SONAR_DB_NAME=${{ steps.openbao.outputs.SONAR_DB_NAME }}
            SONAR_DB_USERNAME=${{ steps.openbao.outputs.SONAR_DB_USERNAME }}
            SONAR_DB_PASSWORD=${{ steps.openbao.outputs.SONAR_DB_PASSWORD }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

      - name: Set SonarQube admin password
        env:
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ vars.SERVER_SSH_PORT }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          SONAR_ADMIN_PASSWORD: ${{ steps.openbao.outputs.SONAR_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          umask 077
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ssh_key
          ssh -i ssh_key -p "$SERVER_SSH_PORT" -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "
            set -euo pipefail
            for i in \$(seq 1 60); do
              if docker run --rm --network sonarqube_internal curlimages/curl:8.17.0 -fsS http://sonarqube:9000/api/system/status >/tmp/sonar-status.json 2>/dev/null; then
                if grep -q '\"status\":\"UP\"' /tmp/sonar-status.json; then
                  break
                fi
              fi
              sleep 10
            done

            docker run --rm --network sonarqube_internal curlimages/curl:8.17.0 -fsS \
              -u admin:admin \
              -X POST http://sonarqube:9000/api/users/change_password \
              -d login=admin \
              -d previousPassword=admin \
              --data-urlencode password='${SONAR_ADMIN_PASSWORD}' || true
          "

  identity-sso:
    if: inputs.stack == 'identity-sso'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh identity-sso

      - name: Configure Keycloak SSO realm and clients
        env:
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_SSH_PORT: ${{ vars.SERVER_SSH_PORT }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: ${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME }}
          KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: ${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD }}
          SSO_ADMIN_USERNAME: ${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME }}
          SSO_ADMIN_PASSWORD: ${{ steps.openbao.outputs.KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD }}
          SSO_ADMIN_EMAIL: admin@panixida.ru
          KOMODO_OIDC_CLIENT_SECRET: ${{ steps.openbao.outputs.KOMODO_OIDC_CLIENT_SECRET }}
          OAUTH2_PROXY_CLIENT_SECRET: ${{ steps.openbao.outputs.OAUTH2_PROXY_CLIENT_SECRET }}
          GRAFANA_OIDC_CLIENT_SECRET: ${{ steps.openbao.outputs.GRAFANA_OIDC_CLIENT_SECRET }}
          OPENBAO_OIDC_CLIENT_SECRET: ${{ steps.openbao.outputs.OPENBAO_OIDC_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          for name in SERVER_USER SERVER_HOST SERVER_SSH_PORT SERVER_SSH_PRIVATE_KEY KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD KOMODO_OIDC_CLIENT_SECRET OAUTH2_PROXY_CLIENT_SECRET GRAFANA_OIDC_CLIENT_SECRET OPENBAO_OIDC_CLIENT_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required"
              exit 1
            fi
          done

          umask 077
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ssh_key
          {
            printf 'KEYCLOAK_REALM=%s\n' panixida
            printf 'KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME=%s\n' "$KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME"
            printf 'KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD=%s\n' "$KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD"
            printf 'SSO_ADMIN_USERNAME=%s\n' "$SSO_ADMIN_USERNAME"
            printf 'SSO_ADMIN_PASSWORD=%s\n' "$SSO_ADMIN_PASSWORD"
            printf 'SSO_ADMIN_EMAIL=%s\n' "$SSO_ADMIN_EMAIL"
            printf 'KOMODO_OIDC_CLIENT_SECRET=%s\n' "$KOMODO_OIDC_CLIENT_SECRET"
            printf 'OAUTH2_PROXY_CLIENT_SECRET=%s\n' "$OAUTH2_PROXY_CLIENT_SECRET"
            printf 'GRAFANA_OIDC_CLIENT_SECRET=%s\n' "$GRAFANA_OIDC_CLIENT_SECRET"
            printf 'OPENBAO_OIDC_CLIENT_SECRET=%s\n' "$OPENBAO_OIDC_CLIENT_SECRET"
          } > keycloak-sso.env

          ssh -i ssh_key -p "$SERVER_SSH_PORT" -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" "install -m 0700 -d /tmp/core-platform-sso"
          scp -i ssh_key -P "$SERVER_SSH_PORT" -o StrictHostKeyChecking=no keycloak-sso.env scripts/keycloak/configure-sso.sh "$SERVER_USER@$SERVER_HOST:/tmp/core-platform-sso/"
          ssh -i ssh_key -p "$SERVER_SSH_PORT" -o StrictHostKeyChecking=no "$SERVER_USER@$SERVER_HOST" '
            set -euo pipefail
            cd /tmp/core-platform-sso
            set -a
            . ./keycloak-sso.env
            set +a
            docker exec -i \
              -e KEYCLOAK_REALM \
              -e KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME \
              -e KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD \
              -e SSO_ADMIN_USERNAME \
              -e SSO_ADMIN_PASSWORD \
              -e SSO_ADMIN_EMAIL \
              -e KOMODO_OIDC_CLIENT_SECRET \
              -e OAUTH2_PROXY_CLIENT_SECRET \
              -e GRAFANA_OIDC_CLIENT_SECRET \
              -e OPENBAO_OIDC_CLIENT_SECRET \
              identity-keycloak-1 bash -s < configure-sso.sh
            rm -rf /tmp/core-platform-sso
          '
