name: Deploy

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to deploy
        required: true
        type: choice
        default: edge
        options:
          - edge
          - identity
          - secrets
          - komodo

permissions:
  contents: read
  packages: read

concurrency:
  group: core-platform-deploy-production
  cancel-in-progress: false

jobs:
  edge:
    if: inputs.stack == 'edge'
    runs-on: ubuntu-latest
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/edge

          compose-file: stacks/edge/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            TRAEFIK_ACME_EMAIL=${{ vars.TRAEFIK_ACME_EMAIL }}
            TRAEFIK_DASHBOARD_HOST=traefik.panixida.ru

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  identity:
    if: inputs.stack == 'identity'
    runs-on: ubuntu-latest
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/identity

          compose-file: stacks/identity/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            KEYCLOAK_HOST=identity.panixida.ru
            KEYCLOAK_DB_HOST=89.191.229.210
            KEYCLOAK_DB_PORT=5432
            KEYCLOAK_DB_NAME=keycloak
            KEYCLOAK_DB_USERNAME=${{ secrets.KEYCLOAK_DB_USERNAME }}
            KEYCLOAK_DB_PASSWORD=${{ secrets.KEYCLOAK_DB_PASSWORD }}
            KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME=${{ secrets.KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME }}
            KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD=${{ secrets.KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  secrets:
    if: inputs.stack == 'secrets'
    runs-on: ubuntu-latest
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/secrets

          compose-file: stacks/secrets/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            OPENBAO_HOST=secrets.panixida.ru

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}

  komodo:
    if: inputs.stack == 'komodo'
    runs-on: ubuntu-latest
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/komodo

          compose-file: stacks/komodo/docker-compose.yml
          env-file: |
            TZ=Europe/Moscow
            COMPOSE_KOMODO_IMAGE_TAG=2
            KOMODO_HOSTNAME=komodo.panixida.ru
            KOMODO_HOST=https://komodo.panixida.ru
            KOMODO_TITLE=Panixida Komodo
            KOMODO_LOCAL_AUTH=true
            KOMODO_INIT_ADMIN_USERNAME=${{ secrets.KOMODO_INIT_ADMIN_USERNAME }}
            KOMODO_INIT_ADMIN_PASSWORD=${{ secrets.KOMODO_INIT_ADMIN_PASSWORD }}
            KOMODO_DISABLE_USER_REGISTRATION=true
            KOMODO_ENABLE_NEW_USERS=false
            KOMODO_DATABASE_USERNAME=${{ secrets.KOMODO_DATABASE_USERNAME }}
            KOMODO_DATABASE_PASSWORD=${{ secrets.KOMODO_DATABASE_PASSWORD }}
            KOMODO_WEBHOOK_SECRET=${{ secrets.KOMODO_WEBHOOK_SECRET }}
            KOMODO_JWT_SECRET=${{ secrets.KOMODO_JWT_SECRET }}
            KOMODO_FIRST_SERVER_NAME=infrastructure
            PERIPHERY_CORE_ADDRESS=ws://core:9120
            PERIPHERY_CONNECT_AS=infrastructure
            PERIPHERY_CORE_PUBLIC_KEYS=file:/config/keys/core.pub
            PERIPHERY_ROOT_DIRECTORY=/opt/core-platform
            PERIPHERY_DISABLE_TERMINALS=false
            PERIPHERY_DISABLE_CONTAINER_TERMINALS=false
            PERIPHERY_INCLUDE_DISK_MOUNTS=/etc/hostname
            KOMODO_OIDC_ENABLED=${{ vars.KOMODO_OIDC_ENABLED }}
            KOMODO_OIDC_PROVIDER=${{ vars.KOMODO_OIDC_PROVIDER }}
            KOMODO_OIDC_CLIENT_ID=${{ vars.KOMODO_OIDC_CLIENT_ID }}
            KOMODO_OIDC_CLIENT_SECRET=${{ secrets.KOMODO_OIDC_CLIENT_SECRET }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}
