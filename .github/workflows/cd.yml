name: Deploy

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack to deploy
        required: true
        type: choice
        default: smoke
        options:
          - smoke
          - all

permissions:
  contents: read
  packages: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - stack: smoke
            compose_file: stacks/smoke/docker-compose.yml
            env_file: |
              TZ=Europe/Moscow
    if: ${{ inputs.stack == 'all' || inputs.stack == matrix.stack }}
    steps:
      - uses: PANiXiDA-Infrastructure/ci-cd/.github/actions/ssh-docker-compose-deploy@main
        with:
          server-user: ${{ vars.SERVER_USER }}
          server-host: ${{ vars.SERVER_HOST }}
          ssh-port: ${{ vars.SERVER_SSH_PORT }}
          ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}

          service-folder: ${{ vars.SERVICE_FOLDER }}/${{ matrix.stack }}

          compose-file: ${{ matrix.compose_file }}
          env-file: ${{ matrix.env_file }}

          registry-url: ghcr.io
          registry-user: ${{ github.actor }}
          registry-token: ${{ github.token }}
