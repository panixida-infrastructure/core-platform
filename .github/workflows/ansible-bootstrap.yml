name: Ansible Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type bootstrap-production to run the bootstrap playbook
        required: true
        type: string

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ vars.SERVER_HOST }}
      SERVER_USER: ${{ vars.SERVER_USER }}
      SERVER_SSH_PORT: ${{ vars.SERVER_SSH_PORT }}
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "bootstrap-production" ]; then
            echo "::error::Confirmation must be exactly bootstrap-production"
            exit 1
          fi

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible ansible-lint

      - name: Configure SSH
        env:
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ] || [ -z "${SERVER_SSH_PORT:-}" ] || [ -z "${SERVER_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::SERVER_HOST, SERVER_USER, SERVER_SSH_PORT and SERVER_SSH_PRIVATE_KEY are required"
            exit 1
          fi

          install -m 0700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 0600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$SERVER_SSH_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Run bootstrap playbook
        run: |
          ansible-playbook \
            -i ansible/inventories/production/hosts.yml \
            ansible/playbooks/bootstrap.yml
