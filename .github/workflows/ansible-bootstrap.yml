name: Ansible Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type bootstrap-production to run the bootstrap playbook
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ vars.SERVER_HOST }}
      SERVER_USER: ${{ vars.SERVER_USER }}
      SERVER_SSH_PORT: ${{ vars.SERVER_SSH_PORT }}
      TACTICALHEROES_DEV_HOST: ${{ vars.TACTICALHEROES_DEV_HOST }}
      TACTICALHEROES_DEV_USER: ${{ vars.TACTICALHEROES_DEV_USER }}
      TACTICALHEROES_DEV_SSH_PORT: ${{ vars.TACTICALHEROES_DEV_SSH_PORT }}
      CODEXVPN_SSH_PUBLIC_KEY: ${{ vars.CODEXVPN_SSH_PUBLIC_KEY }}
      ROOT_SSH_PUBLIC_KEY: ${{ vars.ROOT_SSH_PUBLIC_KEY }}
      WIREGUARD_ADDRESS: ${{ vars.WIREGUARD_ADDRESS }}
      WIREGUARD_PEER_PUBLIC_KEY: ${{ vars.WIREGUARD_PEER_PUBLIC_KEY }}
      WIREGUARD_ENDPOINT: ${{ vars.WIREGUARD_ENDPOINT }}
      WIREGUARD_ALLOWED_IPS: ${{ vars.WIREGUARD_ALLOWED_IPS }}
      WIREGUARD_PERSISTENT_KEEPALIVE: ${{ vars.WIREGUARD_PERSISTENT_KEEPALIVE }}
      SERVER_GH_USER: ${{ vars.SERVER_GH_USER }}
      OBSERVABILITY_VM_REMOTE_WRITE_URL: ${{ vars.OBSERVABILITY_VM_REMOTE_WRITE_URL }}
      OBSERVABILITY_LOGS_REMOTE_WRITE_URL: ${{ vars.OBSERVABILITY_LOGS_REMOTE_WRITE_URL }}
    steps:
      - uses: actions/checkout@v6

      - name: Fetch OpenBao bootstrap secrets
        id: openbao
        run: bash scripts/openbao/fetch-github-actions-secrets.sh bootstrap

      - name: Export OpenBao bootstrap secrets
        run: |
          {
            echo 'SERVER_GH_PAT<<EOF'
            echo '${{ steps.openbao.outputs.SERVER_GH_PAT }}'
            echo 'EOF'
            echo 'WIREGUARD_PRIVATE_KEY<<EOF'
            echo '${{ steps.openbao.outputs.WIREGUARD_PRIVATE_KEY }}'
            echo 'EOF'
            echo 'WIREGUARD_PRESHARED_KEY<<EOF'
            echo '${{ steps.openbao.outputs.WIREGUARD_PRESHARED_KEY }}'
            echo 'EOF'
            echo 'OBSERVABILITY_VM_REMOTE_WRITE_USERNAME<<EOF'
            echo '${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_USERNAME }}'
            echo 'EOF'
            echo 'OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD<<EOF'
            echo '${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD }}'
            echo 'EOF'
            echo 'OBSERVABILITY_LOGS_REMOTE_WRITE_USERNAME<<EOF'
            echo '${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_USERNAME }}'
            echo 'EOF'
            echo 'OBSERVABILITY_LOGS_REMOTE_WRITE_PASSWORD<<EOF'
            echo '${{ steps.openbao.outputs.OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD }}'
            echo 'EOF'
          } >> "$GITHUB_ENV"

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "bootstrap-production" ]; then
            echo "::error::Confirmation must be exactly bootstrap-production"
            exit 1
          fi

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible ansible-lint
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH
        env:
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          TACTICALHEROES_DEV_SSH_PRIVATE_KEY: ${{ steps.openbao.outputs.TACTICALHEROES_DEV_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SERVER_HOST:-}" ] || [ -z "${SERVER_USER:-}" ] || [ -z "${SERVER_SSH_PORT:-}" ] || [ -z "${SERVER_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::SERVER_HOST, SERVER_USER, SERVER_SSH_PORT and SERVER_SSH_PRIVATE_KEY are required"
            exit 1
          fi
          if [ -z "${TACTICALHEROES_DEV_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::TACTICALHEROES_DEV_SSH_PRIVATE_KEY is required"
            exit 1
          fi

          TACTICALHEROES_DEV_HOST="${TACTICALHEROES_DEV_HOST:-80.90.187.254}"
          TACTICALHEROES_DEV_USER="${TACTICALHEROES_DEV_USER:-root}"
          TACTICALHEROES_DEV_SSH_PORT="${TACTICALHEROES_DEV_SSH_PORT:-22}"

          install -m 0700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_PRIVATE_KEY" > ~/.ssh/infrastructure_ed25519
          printf '%s\n' "$TACTICALHEROES_DEV_SSH_PRIVATE_KEY" > ~/.ssh/tacticalheroes_dev_ed25519
          chmod 0600 ~/.ssh/infrastructure_ed25519 ~/.ssh/tacticalheroes_dev_ed25519
          {
            echo "INFRASTRUCTURE_SSH_PRIVATE_KEY_FILE=$HOME/.ssh/infrastructure_ed25519"
            echo "TACTICALHEROES_DEV_SSH_PRIVATE_KEY_FILE=$HOME/.ssh/tacticalheroes_dev_ed25519"
            echo "TACTICALHEROES_DEV_HOST=$TACTICALHEROES_DEV_HOST"
            echo "TACTICALHEROES_DEV_USER=$TACTICALHEROES_DEV_USER"
            echo "TACTICALHEROES_DEV_SSH_PORT=$TACTICALHEROES_DEV_SSH_PORT"
          } >> "$GITHUB_ENV"
          ssh-keyscan -p "$SERVER_SSH_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts
          ssh-keyscan -p "$TACTICALHEROES_DEV_SSH_PORT" "$TACTICALHEROES_DEV_HOST" >> ~/.ssh/known_hosts

      - name: Check Ansible bootstrap inputs
        run: |
          set -euo pipefail
          for name in CODEXVPN_SSH_PUBLIC_KEY ROOT_SSH_PUBLIC_KEY WIREGUARD_ADDRESS WIREGUARD_PEER_PUBLIC_KEY WIREGUARD_ENDPOINT WIREGUARD_ALLOWED_IPS WIREGUARD_PERSISTENT_KEEPALIVE WIREGUARD_PRIVATE_KEY WIREGUARD_PRESHARED_KEY SERVER_GH_PAT; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is required"
              exit 1
            fi
          done

      - name: Run bootstrap playbook
        run: |
          ansible-playbook \
            -i ansible/inventories/production/hosts.yml \
            ansible/playbooks/bootstrap.yml

      - name: Run managed agents playbook
        run: |
          ansible-playbook \
            -i ansible/inventories/production/hosts.yml \
            ansible/playbooks/managed-agents.yml
