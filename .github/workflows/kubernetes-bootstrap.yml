name: Kubernetes Bootstrap

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type bootstrap-kubernetes to bootstrap the managed cluster
        required: true
        type: string
      install_controllers:
        description: Install or upgrade core Kubernetes controllers with Helm
        required: true
        type: boolean
        default: true
      install_platform_ui:
        description: Install or upgrade Argo CD and Headlamp with Helm
        required: true
        type: boolean
        default: true
      install_timeweb_addons:
        description: Install required Timeweb Kubernetes addons
        required: true
        type: boolean
        default: true
      apply_gitops_root:
        description: Apply the Argo CD root application from this repository
        required: true
        type: boolean
        default: true
      apply_retained_disk_pv:
        description: Create a retained PV/PVC for the OpenTofu-managed MSK-1 network drive
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: kubernetes-bootstrap-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_twc_token: ${{ secrets.TIMEWEB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /tmp/core-platform.kubeconfig
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "bootstrap-kubernetes" ]; then
            echo "::error::Confirmation must be exactly bootstrap-kubernetes"
            exit 1
          fi

      - name: Check required secrets
        run: |
          set -euo pipefail
          for name in TF_VAR_twc_token AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is not available"
              exit 1
            fi
          done

      - name: Install CLI tools
        run: |
          set -euo pipefail
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y gettext-base tofu
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Write kubeconfig from OpenTofu state
        working-directory: opentofu/envs/production
        run: |
          set -euo pipefail
          tofu init -input=false
          tofu output -raw core_platform_kubeconfig > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl version --client=true
          kubectl get nodes -o wide

      - name: Install Kubernetes controllers
        if: inputs.install_controllers
        run: |
          set -euo pipefail
          helm repo add external-secrets https://charts.external-secrets.io
          helm repo update

          helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager \
            --version v1.20.2 \
            --namespace cert-manager \
            --create-namespace \
            --set crds.enabled=true \
            --set config.enableGatewayAPI=true \
            --wait \
            --timeout 10m

          helm upgrade --install eg oci://docker.io/envoyproxy/gateway-helm \
            --version v1.8.0 \
            --namespace envoy-gateway-system \
            --create-namespace \
            --wait \
            --timeout 10m

          helm upgrade --install external-secrets external-secrets/external-secrets \
            --version 2.4.1 \
            --namespace external-secrets \
            --create-namespace \
            --set installCRDs=true \
            --wait \
            --timeout 10m

          kubectl wait --timeout=5m -n envoy-gateway-system deployment/envoy-gateway --for=condition=Available
          kubectl rollout restart deployment cert-manager -n cert-manager
          kubectl rollout status deployment cert-manager -n cert-manager --timeout=5m

      - name: Install GitOps UI
        if: inputs.install_platform_ui
        run: |
          set -euo pipefail
          helm repo add argo https://argoproj.github.io/argo-helm
          helm repo add headlamp https://kubernetes-sigs.github.io/headlamp/
          helm repo update

          helm upgrade --install argo-cd argo/argo-cd \
            --version 9.3.7 \
            --namespace argocd \
            --create-namespace \
            -f kubernetes/bootstrap/argocd-values.yaml \
            --wait \
            --timeout 15m

          headlamp_args=(
            upgrade --install headlamp headlamp/headlamp
            --version 0.38.0
            --namespace headlamp
            --create-namespace
          )
          if kubectl -n headlamp get secret headlamp-oidc >/dev/null 2>&1; then
            headlamp_args+=(-f kubernetes/bootstrap/headlamp-values.yaml)
          else
            headlamp_args+=(--set service.type=ClusterIP)
            echo "headlamp-oidc secret is not present yet; installing Headlamp without OIDC values"
          fi
          helm "${headlamp_args[@]}" \
            --wait \
            --timeout 10m

      - name: Apply Argo CD root application
        if: inputs.apply_gitops_root
        run: |
          kubectl apply -f kubernetes/bootstrap/argocd-root.yaml
          kubectl -n argocd annotate applications.argoproj.io core-platform argocd.argoproj.io/refresh=hard --overwrite
          for _ in $(seq 1 60); do
            sync_status="$(kubectl -n argocd get application core-platform -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            operation_phase="$(kubectl -n argocd get application core-platform -o jsonpath='{.status.operationState.phase}' 2>/dev/null || true)"
            if [ "$sync_status" = "Synced" ] && [ "$operation_phase" != "Running" ]; then
              exit 0
            fi
            sleep 5
          done
          kubectl -n argocd get application core-platform -o yaml || true
          echo "::error::core-platform root application did not finish syncing"
          exit 1

      - name: Install Timeweb Kubernetes addons
        if: inputs.install_timeweb_addons
        working-directory: opentofu/envs/production
        run: |
          set -euo pipefail
          cluster_id="$(tofu output -json timeweb_inventory | jq -r '.kubernetes.id')"
          if [ -z "$cluster_id" ] || [ "$cluster_id" = "null" ]; then
            echo "::error::Kubernetes cluster id is missing from OpenTofu output"
            exit 1
          fi

          if kubectl -n argocd get application platform-workloads >/dev/null 2>&1; then
            kubectl -n argocd annotate application platform-workloads argocd.argoproj.io/refresh=hard --overwrite || true
            for _ in $(seq 1 60); do
              sync_status="$(kubectl -n argocd get application platform-workloads -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
              operation_phase="$(kubectl -n argocd get application platform-workloads -o jsonpath='{.status.operationState.phase}' 2>/dev/null || true)"
              if [ "$sync_status" = "Synced" ] && [ "$operation_phase" != "Running" ]; then
                break
              fi
              sleep 10
            done

            sync_status="$(kubectl -n argocd get application platform-workloads -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            operation_phase="$(kubectl -n argocd get application platform-workloads -o jsonpath='{.status.operationState.phase}' 2>/dev/null || true)"
            if [ "$sync_status" != "Synced" ] || [ "$operation_phase" = "Running" ]; then
              kubectl -n argocd get application platform-workloads -o yaml || true
              echo "::error::platform-workloads must be synced before installing the Timeweb CSI driver"
              exit 1
            fi
          fi

          stale_statefulsets=0
          for workload in \
            observability/victoriametrics \
            observability/victorialogs \
            observability/victoriatraces \
            observability/alertmanager \
            quality/sonarqube; do
            namespace="${workload%/*}"
            name="${workload#*/}"
            if kubectl get statefulset -n "$namespace" "$name" >/dev/null 2>&1; then
              echo "::error::Stale StatefulSet ${workload} still exists. Refusing to install CSI before Argo prunes it."
              stale_statefulsets=1
            fi
          done
          if [ "$stale_statefulsets" -ne 0 ]; then
            exit 1
          fi

          delete_pending_pvc() {
            local namespace="$1"
            local name="$2"
            local phase
            local volume_name

            phase="$(kubectl get pvc -n "$namespace" "$name" -o jsonpath='{.status.phase}' 2>/dev/null || true)"
            volume_name="$(kubectl get pvc -n "$namespace" "$name" -o jsonpath='{.spec.volumeName}' 2>/dev/null || true)"
            if [ "$phase" = "Pending" ] && [ -z "$volume_name" ]; then
              kubectl delete pvc -n "$namespace" "$name"
            fi
          }

          delete_pending_pvc observability data-victoriametrics-0
          delete_pending_pvc observability data-victorialogs-0
          delete_pending_pvc observability data-victoriatraces-0
          delete_pending_pvc observability data-alertmanager-0
          delete_pending_pvc quality sonarqube-data-sonarqube-0

          values_file="$(mktemp)"
          trap 'rm -f "$values_file"' EXIT
          umask 077
          cat > "$values_file" <<EOF
          TW_API_SECRET: "${TF_VAR_twc_token}"
          TW_CLUSTER_ID: "${cluster_id}"
          provisionerName: network-drives.csi.timeweb.cloud
          image:
            repository: cr-internal.twcstorage.ru/network-drives-csi/driver
            tag: 2
            pullPolicy: Always
          node:
            logLevel: info
            logJson: true
          controller:
            replicas: 1
            nodeSelector: {}
            tolerations: []
          rbac:
            createRoles: true
            createServiceAccounts: true
          metrics:
            podMonitor:
              enabled: false
              port: metrics
              path: /metrics
              interval: 60s
          EOF

          helm upgrade --install csi-tw-helm oci://cr-internal.twcstorage.ru/network-drives-csi/csi-driver-timeweb-cloud \
            -f "$values_file" \
            --namespace csi-driver-timeweb-cloud \
            --create-namespace \
            --wait \
            --timeout 10m

          kubectl get csidriver network-drives.csi.timeweb.cloud
          kubectl get storageclass

      - name: Apply retained network drive PV
        if: inputs.apply_retained_disk_pv
        working-directory: opentofu/envs/production
        run: |
          set -euo pipefail
          CORE_PLATFORM_NETWORK_DRIVE_ID="$(tofu output -json timeweb_inventory | jq -r '.network_drives.core_platform_nvme.id')"
          if [ -z "$CORE_PLATFORM_NETWORK_DRIVE_ID" ] || [ "$CORE_PLATFORM_NETWORK_DRIVE_ID" = "null" ]; then
            echo "::error::core-platform NVMe network drive id is missing from OpenTofu output"
            exit 1
          fi
          CORE_PLATFORM_NETWORK_DRIVE_SIZE_GB="$(tofu output -json timeweb_inventory | jq -r '.network_drives.core_platform_nvme.size_gb')"
          if [ -z "$CORE_PLATFORM_NETWORK_DRIVE_SIZE_GB" ] || [ "$CORE_PLATFORM_NETWORK_DRIVE_SIZE_GB" = "null" ]; then
            echo "::error::core-platform NVMe network drive size is missing from OpenTofu output"
            exit 1
          fi
          CORE_PLATFORM_NETWORK_DRIVE_SIZE_GI="${CORE_PLATFORM_NETWORK_DRIVE_SIZE_GB}Gi"
          export CORE_PLATFORM_NETWORK_DRIVE_ID
          export CORE_PLATFORM_NETWORK_DRIVE_SIZE_GI
          envsubst < ../../../kubernetes/bootstrap/core-platform-network-drive.tpl.yaml | kubectl apply -f -
