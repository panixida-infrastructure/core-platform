name: OpenTofu Apply

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type apply-production to apply the current production OpenTofu configuration
        required: true
        type: string
      skip_refresh:
        description: Skip state refresh when the Timeweb API has a read-only provider incident
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: opentofu-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_twc_token: ${{ secrets.TIMEWEB_TOKEN }}
  TIMEWEB_TOKEN: ${{ secrets.TIMEWEB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opentofu/envs/production
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "apply-production" ]; then
            echo "::error::Confirmation must be exactly apply-production"
            exit 1
          fi

      - name: Install OpenTofu
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y tofu

      - name: Check required secrets
        run: |
          set -euo pipefail
          for name in TF_VAR_twc_token TIMEWEB_TOKEN AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} is not available"
              exit 1
            fi
          done

      - name: Init
        run: tofu init -input=false

      - name: Reconcile Timeweb projects
        run: bash ../../../scripts/timeweb/reconcile-core-platform-project.sh

      - name: Reconcile OpenTofu state
        run: bash ../../scripts/reconcile-production-state.sh

      - name: Remove retired SSH key from state
        run: |
          if tofu state list | grep -Fxq twc_ssh_key.oldstrategyforge_245799; then
            tofu state rm twc_ssh_key.oldstrategyforge_245799
          fi

      - name: Plan
        run: |
          plan_args=(-input=false -no-color -out=production.tfplan)
          if [ "${{ inputs.skip_refresh }}" = "true" ]; then
            plan_args+=(-refresh=false)
          fi
          tofu plan "${plan_args[@]}"

      - name: Apply
        run: tofu apply -input=false -auto-approve production.tfplan
