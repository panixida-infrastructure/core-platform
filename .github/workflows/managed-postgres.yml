name: Managed PostgreSQL

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type reconcile-managed-postgres to reconcile the MSK managed PostgreSQL cluster
        required: true
        type: string
      migrate_legacy_databases:
        description: Migrate existing managed PostgreSQL databases from SPB to MSK
        required: true
        type: boolean
        default: false
      force_restore:
        description: Allow restoring into non-empty target databases
        required: true
        type: boolean
        default: false
      deploy_stacks:
        description: Dispatch identity and observability deploys after reconcile
        required: true
        type: boolean
        default: false
      recreate_target_users:
        description: Space-separated target DB users to recreate with OpenBao passwords
        required: false
        type: string
        default: ""

permissions:
  actions: write
  contents: read
  id-token: write

concurrency:
  group: managed-postgres-production
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "reconcile-managed-postgres" ]; then
            echo "::error::Confirmation must be exactly reconcile-managed-postgres"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /etc/apt/keyrings/postgresql.gpg
          echo "deb [signed-by=/etc/apt/keyrings/postgresql.gpg] https://apt.postgresql.org/pub/repos/apt noble-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/postgresql.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          echo "/usr/lib/postgresql/18/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/18/bin/pg_dump --version

      - name: Reconcile managed PostgreSQL
        env:
          TIMEWEB_TOKEN: ${{ secrets.TIMEWEB_TOKEN }}
          MIGRATE_LEGACY_DATABASES: ${{ inputs.migrate_legacy_databases }}
          FORCE_RESTORE: ${{ inputs.force_restore }}
          TARGET_POSTGRES_SSH_TUNNEL: ${{ inputs.migrate_legacy_databases }}
          SERVER_HOST: ${{ vars.SERVER_HOST }}
          SERVER_USER: ${{ vars.SERVER_USER }}
          SERVER_SSH_PORT: ${{ vars.SERVER_SSH_PORT }}
          SERVER_SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          RECREATE_TARGET_DB_USERS: ${{ inputs.recreate_target_users != '' && inputs.recreate_target_users || (inputs.migrate_legacy_databases && 'dotnet_template_user keycloak_user' || '') }}
        run: bash scripts/timeweb/reconcile-managed-postgres.sh

      - name: Dispatch dependent deploys
        if: inputs.deploy_stacks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run Deploy --repo "$GITHUB_REPOSITORY" -f stack=identity
          gh workflow run Deploy --repo "$GITHUB_REPOSITORY" -f stack=observability
