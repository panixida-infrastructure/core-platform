name: OpenBao Static Seal Migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type migrate-openbao-static-seal to migrate OpenBao to static seal
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: openbao-static-seal-migration-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_twc_token: ${{ secrets.TIMEWEB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /tmp/core-platform.kubeconfig
      OPENBAO_STATIC_SEAL_KEY: ${{ secrets.OPENBAO_STATIC_SEAL_KEY }}
      OPENBAO_UNSEAL_KEY: ${{ secrets.OPENBAO_UNSEAL_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation and required secrets
        run: |
          set -euo pipefail
          if [ "${{ inputs.confirm }}" != "migrate-openbao-static-seal" ]; then
            echo "::error::Confirmation must be exactly migrate-openbao-static-seal"
            exit 1
          fi
          if [ -z "${OPENBAO_STATIC_SEAL_KEY:-}" ]; then
            echo "::error::OPENBAO_STATIC_SEAL_KEY is not available"
            exit 1
          fi
          if [ -z "${OPENBAO_UNSEAL_KEY:-}" ]; then
            echo "::error::OPENBAO_UNSEAL_KEY is not available"
            exit 1
          fi

      - name: Install CLI tools
        run: |
          set -euo pipefail
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y tofu
          kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Write kubeconfig from OpenTofu state
        working-directory: opentofu/envs/production
        run: |
          set -euo pipefail
          tofu init -input=false
          tofu output -raw core_platform_kubeconfig > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl get nodes -o wide

      - name: Sync static seal secret
        run: |
          set -euo pipefail
          kubectl create namespace secrets --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n secrets create secret generic openbao-static-seal \
            --from-literal=OPENBAO_STATIC_SEAL_KEY="$OPENBAO_STATIC_SEAL_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Wait for OpenBao static seal deployment
        run: |
          set -euo pipefail

          if kubectl -n argocd get application platform-workloads >/dev/null 2>&1; then
            kubectl -n argocd annotate application platform-workloads argocd.argoproj.io/refresh=hard --overwrite
          fi

          for _ in $(seq 1 120); do
            if kubectl -n secrets get deployment openbao -o json \
              | jq -e '.spec.template.spec.containers[] | select(.name == "openbao") | (.env // [])[]? | select(.name == "OPENBAO_STATIC_SEAL_KEY")' >/dev/null; then
              kubectl -n secrets rollout status deployment/openbao --timeout=10m
              exit 0
            fi
            sleep 5
          done

          kubectl -n secrets get deployment openbao -o yaml || true
          echo "::error::OpenBao deployment was not updated with static seal configuration"
          exit 1

      - name: Migrate OpenBao seal and verify auto-unseal
        run: |
          set -euo pipefail

          start_port_forward() {
            kubectl -n secrets port-forward svc/openbao 18200:8200 >/tmp/openbao-port-forward.log 2>&1 &
            port_forward_pid="$!"
            for _ in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:18200/v1/sys/seal-status >/tmp/openbao-status.json; then
                return 0
              fi
              sleep 2
            done

            cat /tmp/openbao-port-forward.log || true
            echo "::error::OpenBao port-forward did not become ready"
            return 1
          }

          stop_port_forward() {
            if [ -n "${port_forward_pid:-}" ]; then
              kill "$port_forward_pid" >/dev/null 2>&1 || true
              wait "$port_forward_pid" >/dev/null 2>&1 || true
              unset port_forward_pid
            fi
          }

          trap stop_port_forward EXIT

          start_port_forward
          status_json="$(cat /tmp/openbao-status.json)"
          jq '{type, initialized, sealed, migration, version, storage_type}' <<<"$status_json"

          initialized="$(jq -r '.initialized' <<<"$status_json")"
          sealed="$(jq -r '.sealed' <<<"$status_json")"
          migration="$(jq -r '.migration // false' <<<"$status_json")"
          seal_type="$(jq -r '.type // ""' <<<"$status_json")"

          if [ "$initialized" != "true" ]; then
            echo "::error::OpenBao is not initialized"
            exit 1
          fi

          if [ "$sealed" = "true" ] || [ "$migration" = "true" ] || [ "$seal_type" != "static" ]; then
            migrate_response="$(
              jq -n --arg key "$OPENBAO_UNSEAL_KEY" '{key: $key, migrate: true}' \
                | curl -fsS -X POST \
                    -H "Content-Type: application/json" \
                    --data-binary @- \
                    http://127.0.0.1:18200/v1/sys/unseal
            )"
            jq '{type, sealed, progress, t, n, migration, version}' <<<"$migrate_response"
            if [ "$(jq -r '.sealed' <<<"$migrate_response")" != "false" ]; then
              echo "::error::OpenBao is still sealed after static seal migration attempt"
              exit 1
            fi
          fi

          stop_port_forward
          kubectl -n secrets rollout restart deployment/openbao
          kubectl -n secrets rollout status deployment/openbao --timeout=10m

          start_port_forward
          for _ in $(seq 1 60); do
            status_after="$(curl -fsS http://127.0.0.1:18200/v1/sys/seal-status)"
            sealed_after="$(jq -r '.sealed' <<<"$status_after")"
            type_after="$(jq -r '.type // ""' <<<"$status_after")"
            migration_after="$(jq -r '.migration // false' <<<"$status_after")"
            if [ "$sealed_after" = "false" ] && [ "$type_after" = "static" ] && [ "$migration_after" != "true" ]; then
              jq '{type, initialized, sealed, migration, version, storage_type}' <<<"$status_after"
              exit 0
            fi
            sleep 2
          done

          jq '{type, initialized, sealed, migration, version, storage_type}' <<<"$status_after"
          echo "::error::OpenBao did not auto-unseal after restart"
          exit 1
