name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opentofu/envs/production
    steps:
      - uses: actions/checkout@v6

      - name: Install OpenTofu
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y tofu

      - name: Format
        run: tofu fmt -check -recursive ../..

      - name: Init
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  ansible:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Ansible tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install "ansible-core<2.17" "ansible-lint<25"
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Syntax check
        run: |
          ansible-playbook -i ansible/inventories/production/hosts.yml ansible/playbooks/bootstrap.yml --syntax-check
          ansible-playbook -i ansible/inventories/production/hosts.yml ansible/playbooks/managed-agents.yml --syntax-check

      - name: Lint
        run: ansible-lint ansible/playbooks
