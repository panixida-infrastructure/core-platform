name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Syntax check
        run: find scripts opentofu/scripts -name '*.sh' -print0 | xargs -0 -n1 bash -n

  opentofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opentofu/envs/production
    steps:
      - uses: actions/checkout@v6

      - name: Install OpenTofu
        run: |
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y tofu

      - name: Format
        run: tofu fmt -check -recursive ../..

      - name: Init
        run: tofu init -backend=false

      - name: Validate
        run: tofu validate

  kubernetes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Kubernetes tooling
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Render Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl kustomize kubernetes/apps >/tmp/core-platform-apps.yaml
          helm lint kubernetes/charts/core-platform-workloads
          helm template platform-workloads kubernetes/charts/core-platform-workloads >/tmp/core-platform-workloads.yaml
