name: Kubernetes Secrets Sync

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type sync-kubernetes-secrets to copy OpenBao secrets into Kubernetes
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: kubernetes-secrets-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_twc_token: ${{ secrets.TIMEWEB_TOKEN }}
  AWS_ACCESS_KEY_ID: ${{ secrets.TOFU_STATE_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TOFU_STATE_SECRET_KEY }}

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      KUBECONFIG: /tmp/core-platform.kubeconfig
    steps:
      - uses: actions/checkout@v6

      - name: Check confirmation
        run: |
          if [ "${{ inputs.confirm }}" != "sync-kubernetes-secrets" ]; then
            echo "::error::Confirmation must be exactly sync-kubernetes-secrets"
            exit 1
          fi

      - name: Install CLI tools
        run: |
          set -euo pipefail
          sudo install -m 0755 -d /etc/apt/keyrings
          curl -fsSL https://packages.opentofu.org/opentofu/tofu/gpgkey \
            | sudo gpg --no-tty --batch --dearmor -o /etc/apt/keyrings/opentofu-repo.gpg
          sudo chmod a+r /etc/apt/keyrings/opentofu-repo.gpg
          echo "deb [signed-by=/etc/apt/keyrings/opentofu-repo.gpg] https://packages.opentofu.org/opentofu/tofu/any/ any main" \
            | sudo tee /etc/apt/sources.list.d/opentofu.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y tofu
          kubectl_version="$(curl -fsSL https://dl.k8s.io/release/stable.txt)"
          curl -fsSLo kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/amd64/kubectl"
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

      - name: Write kubeconfig from OpenTofu state
        working-directory: opentofu/envs/production
        run: |
          set -euo pipefail
          tofu init -input=false
          tofu output -raw core_platform_kubeconfig > "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          kubectl get nodes -o wide

      - name: Sync OpenBao static seal key
        env:
          OPENBAO_STATIC_SEAL_KEY: ${{ secrets.OPENBAO_STATIC_SEAL_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${OPENBAO_STATIC_SEAL_KEY:-}" ]; then
            echo "::error::OPENBAO_STATIC_SEAL_KEY is not available"
            exit 1
          fi

          kubectl create namespace secrets --dry-run=client -o yaml | kubectl apply -f -
          kubectl -n secrets create secret generic openbao-static-seal \
            --from-literal=OPENBAO_STATIC_SEAL_KEY="$OPENBAO_STATIC_SEAL_KEY" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Sync OpenBao secrets to Kubernetes
        run: |
          set -euo pipefail
          kubectl -n secrets port-forward svc/openbao 18200:8200 >/tmp/openbao-port-forward.log 2>&1 &
          port_forward_pid="$!"
          trap 'kill "$port_forward_pid" >/dev/null 2>&1 || true' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18200/v1/sys/health >/dev/null; then
              OPENBAO_ADDR=http://127.0.0.1:18200 bash scripts/kubernetes/sync-openbao-secrets.sh
              OPENBAO_ADDR=http://127.0.0.1:18200 bash scripts/openbao/configure-from-github-actions.sh
              exit 0
            fi
            sleep 2
          done

          cat /tmp/openbao-port-forward.log || true
          echo "::error::OpenBao port-forward did not become ready"
          exit 1

      - name: Refresh platform workloads
        run: |
          set -euo pipefail
          if kubectl -n headlamp get deployment headlamp >/dev/null 2>&1; then
            kubectl -n headlamp rollout restart deployment/headlamp
            kubectl -n headlamp rollout status deployment/headlamp --timeout=5m || true
          fi
          kubectl -n argocd rollout restart deployment/argo-cd-argocd-repo-server
          kubectl -n argocd rollout status deployment/argo-cd-argocd-repo-server --timeout=5m
          for application in platform-workloads dotnet-template-development dotnet-template-production; do
            if kubectl -n argocd get application "$application" >/dev/null 2>&1; then
              kubectl -n argocd annotate application "$application" argocd.argoproj.io/refresh=hard --overwrite
            fi
          done
