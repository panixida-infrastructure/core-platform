{{- if .Values.keycloak.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
spec:
  replicas: {{ .Values.keycloak.replicas }}
  {{- if and .Values.keycloak.jgroupsCleanup.enabled (eq (int .Values.keycloak.replicas) 1) }}
  strategy:
    type: Recreate
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak
        app.kubernetes.io/part-of: core-platform
    spec:
      {{- if and .Values.keycloak.jgroupsCleanup.enabled (eq (int .Values.keycloak.replicas) 1) }}
      initContainers:
        - name: jgroups-cleanup
          image: postgres:17-alpine
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: KEYCLOAK_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_HOST
            - name: KEYCLOAK_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_PORT
            - name: KEYCLOAK_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_NAME
            - name: KEYCLOAK_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_USERNAME
            - name: KEYCLOAK_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_PASSWORD
          command:
            - sh
            - -ec
          args:
            - |
              export PGPASSWORD="$KEYCLOAK_DB_PASSWORD"
              psql "host=$KEYCLOAK_DB_HOST port=$KEYCLOAK_DB_PORT dbname=$KEYCLOAK_DB_NAME user=$KEYCLOAK_DB_USERNAME sslmode=require" <<'SQL'
              do $$
              begin
                if to_regclass('public.jgroups_ping') is not null then
                  delete from public.jgroups_ping;
                end if;
              end $$;
              SQL
      {{- end }}
      containers:
        - name: keycloak
          image: {{ .Values.keycloak.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - start
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_HOST
            - name: KC_DB_URL_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_PORT
            - name: KC_DB_URL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_NAME
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_DB_PASSWORD
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD
            - name: KC_HOSTNAME
              value: https://{{ .Values.keycloak.host }}
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_CACHE
              value: ispn
            - name: KC_CACHE_STACK
              value: jdbc-ping
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: management
      port: 9000
      targetPort: management
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: {{ .Values.keycloak.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpSectionName }}
  hostnames:
    - {{ .Values.keycloak.host }}
  rules:
    - backendRefs:
        - name: keycloak
          port: 8080
{{- end }}
