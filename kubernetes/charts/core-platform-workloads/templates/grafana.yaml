{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        uid: victoriametrics
        type: prometheus
        access: proxy
        url: http://victoriametrics.observability.svc.cluster.local:8428
        isDefault: true
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaLogs
        uid: victorialogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victorialogs.observability.svc.cluster.local:9428
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaTraces
        uid: victoriatraces
        type: jaeger
        access: proxy
        url: http://victoriatraces.observability.svc.cluster.local:10428/select/jaeger
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.observability.svc.cluster.local:9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: core-platform
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: GF_SERVER_ROOT_URL
              value: https://{{ .Values.grafana.host }}
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GRAFANA_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_HOST
            - name: GRAFANA_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_PORT
            - name: GF_DATABASE_HOST
              value: $(GRAFANA_DB_HOST):$(GRAFANA_DB_PORT)
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_NAME
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_USERNAME
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_PASSWORD
            - name: GF_DATABASE_SSL_MODE
              value: require
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: Keycloak
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: grafana
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_OIDC_CLIENT_SECRET
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: openid email profile
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'platform-admins') && 'GrafanaAdmin' || contains(groups[*], 'platform-viewers') && 'Viewer' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/auth
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/token
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/userinfo
            - name: GF_INSTALL_PLUGINS
              value: victoriametrics-logs-datasource
            - name: OBSERVABILITY_VM_REMOTE_WRITE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: OBSERVABILITY_VM_REMOTE_WRITE_USERNAME
            - name: OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpSectionName }}
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpsSectionNames.grafana }}
  hostnames:
    - {{ .Values.grafana.host }}
  rules:
    - backendRefs:
        - name: grafana
          port: 3000
{{- end }}
