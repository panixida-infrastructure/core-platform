{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  datasources.yml: |
    apiVersion: 1
    deleteDatasources:
      - name: VictoriaMetrics Native
        orgId: 1
    prune: true
    datasources:
      - name: VictoriaMetrics
        uid: victoriametrics
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://victoriametrics.observability.svc.cluster.local:8428
        isDefault: true
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaLogs
        uid: victorialogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victorialogs.observability.svc.cluster.local:9428
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        jsonData:
          logLevelRules:
            - field: severity_text
              value: ^Critical$
              level: critical
              operator: regex
              enabled: true
            - field: severity_text
              value: ^Error$
              level: error
              operator: regex
              enabled: true
            - field: severity_text
              value: ^Warning$
              level: warning
              operator: regex
              enabled: true
            - field: severity_text
              value: ^Information$
              level: info
              operator: regex
              enabled: true
            - field: severity_text
              value: ^Debug$
              level: debug
              operator: regex
              enabled: true
            - field: severity_text
              value: ^Trace$
              level: trace
              operator: regex
              enabled: true
          derivedFields:
            - name: trace_id
              matcherType: label
              matcherRegex: trace_id
              datasourceUid: victoriatraces
              url: '$${__value.raw}'
              urlDisplayLabel: View trace
            - name: service_name
              matcherType: label
              matcherRegex: service.name
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaTraces
        uid: victoriatraces
        type: jaeger
        access: proxy
        url: http://victoriatraces.observability.svc.cluster.local:10428/select/jaeger
        jsonData:
          tracesToLogsV2:
            datasourceUid: victorialogs
            spanStartTimeShift: -5m
            spanEndTimeShift: 5m
            filterByTraceID: true
            filterBySpanID: false
            customQuery: true
            query: 'trace_id:="$${__trace.traceId}"'
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.observability.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: core-platform
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
