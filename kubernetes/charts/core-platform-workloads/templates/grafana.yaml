{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: VictoriaMetrics
        uid: victoriametrics
        type: prometheus
        access: proxy
        url: http://victoriametrics.observability.svc.cluster.local:8428
        isDefault: true
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaLogs
        uid: victorialogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victorialogs.observability.svc.cluster.local:9428
        basicAuth: true
        basicAuthUser: ${OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
        secureJsonData:
          basicAuthPassword: ${OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}
      - name: VictoriaTraces
        uid: victoriatraces
        type: jaeger
        access: proxy
        url: http://victoriatraces.observability.svc.cluster.local:10428/select/jaeger
      - name: Alertmanager
        uid: alertmanager
        type: alertmanager
        access: proxy
        url: http://alertmanager.observability.svc.cluster.local:9093
        jsonData:
          implementation: prometheus
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: core-platform
        orgId: 1
        folder: Core Platform
        type: file
        disableDeletion: false
        updateIntervalSeconds: 60
        allowUiUpdates: false
        options:
          path: /var/lib/grafana/dashboards/core-platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: {{ .Values.grafana.namespace }}
