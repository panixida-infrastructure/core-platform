            },
            "tooltip": {
              "mode": "multi",
              "sort": "desc"
            }
          },
          "targets": [
            {
              "expr": "sum by (namespace) (container_memory_working_set_bytes{container!=\"\",namespace!=\"\"})",
              "legendFormat": "{{`{{namespace}}`}}",
              "refId": "A"
            }
          ],
          "title": "Namespace memory usage",
          "type": "timeseries"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "tags": [
