          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "13.0.1",
          "targets": [
            {
              "expr": "error OR ERROR OR exception | stats count() as errors",
              "query": "error OR ERROR OR exception | stats count() as errors",
              "refId": "A"
            }
          ],
          "title": "Error-like logs",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "grafana",
            "uid": "-- Grafana --"
          },
          "gridPos": {
            "h": 6,
            "w": 8,
            "x": 16,
            "y": 0
          },
          "id": 3,
          "options": {
            "code": {
              "language": "plaintext",
              "showLineNumbers": false,
              "showMiniMap": false
            },
            "content": "Trace ingestion is handled by OpenTelemetry Collector and VictoriaTraces. Use the dashboard link or Grafana Explore with the VictoriaTraces datasource to search by service, operation, or trace id.",
            "mode": "markdown"
          },
          "pluginVersion": "13.0.1",
          "title": "Traces",
          "type": "text"
        },
        {
          "datasource": {
            "type": "victoriametrics-logs-datasource",
            "uid": "victorialogs"
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 14,
            "w": 24,
            "x": 0,
            "y": 6
          },
          "id": 4,
          "options": {
            "dedupStrategy": "none",
            "enableLogDetails": true,
            "prettifyLogMessage": false,
            "showCommonLabels": false,
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          },
          "targets": [
            {
              "expr": "*",
              "query": "*",
              "refId": "A"
            }
          ],
          "title": "Recent Kubernetes logs",
          "type": "logs"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 41,
      "tags": [
        "core-platform",
        "logs",
        "traces"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "Logs and Traces",
      "uid": "logs-and-traces",
      "version": 1,
      "weekStart": ""
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  replicas: {{ .Values.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: core-platform
    spec:
      containers:
        - name: grafana
          image: {{ .Values.grafana.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: GF_SERVER_ROOT_URL
              value: https://{{ .Values.grafana.host }}
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_DATABASE_TYPE
              value: postgres
            - name: GRAFANA_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_HOST
            - name: GRAFANA_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_PORT
            - name: GF_DATABASE_HOST
              value: $(GRAFANA_DB_HOST):$(GRAFANA_DB_PORT)
            - name: GF_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_NAME
            - name: GF_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_USERNAME
            - name: GF_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_DB_PASSWORD
            - name: GF_DATABASE_SSL_MODE
              value: require
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: Keycloak
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: grafana
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: GRAFANA_OIDC_CLIENT_SECRET
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: openid email profile
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'platform-admins') && 'GrafanaAdmin' || contains(groups[*], 'platform-viewers') && 'Viewer' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/auth
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/token
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: https://{{ .Values.keycloak.host }}/realms/panixida/protocol/openid-connect/userinfo
            - name: GF_INSTALL_PLUGINS
              value: victoriametrics-logs-datasource
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: /var/lib/grafana/dashboards/core-platform/core-platform-overview.json
            - name: OBSERVABILITY_VM_REMOTE_WRITE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: OBSERVABILITY_VM_REMOTE_WRITE_USERNAME
            - name: OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.grafana.secretName }}
                  key: OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/core-platform
              readOnly: true
          resources:
            {{- toYaml .Values.grafana.resources | nindent 12 }}
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: grafana
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-http-redirect
  namespace: {{ .Values.grafana.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpSectionName }}
  hostnames:
    - {{ .Values.grafana.host }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: {{ .Values.grafana.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpsSectionNames.grafana }}
  hostnames:
    - {{ .Values.grafana.host }}
  rules:
    - backendRefs:
        - name: grafana
          port: 3000
{{- end }}
