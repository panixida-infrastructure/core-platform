        {
          "datasource": {
            "type": "prometheus",
            "uid": "victoriametrics"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {
                  "options": {
                    "0": {
                      "color": "red",
                      "text": "DOWN"
                    },
                    "1": {
