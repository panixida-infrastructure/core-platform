{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: blackbox-exporter
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: blackbox-exporter
        app.kubernetes.io/part-of: core-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9115"
    spec:
      containers:
        - name: blackbox-exporter
          image: {{ .Values.observability.images.blackboxExporter | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config.file=/etc/blackbox_exporter/blackbox.yml
          ports:
            - name: http
              containerPort: 9115
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox_exporter
              readOnly: true
          resources:
            {{- toYaml .Values.observability.resources.blackboxExporter | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: blackbox-exporter
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 9115
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: core-platform
    spec:
      containers:
        - name: otel-collector
          image: {{ .Values.observability.images.otelCollector | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config=/etc/otelcol/config.yml
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
          resources:
            {{- toYaml .Values.observability.resources.otelCollector | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: otel-collector
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
{{- end }}
