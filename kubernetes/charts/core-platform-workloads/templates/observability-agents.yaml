{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmalert
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmalert
        app.kubernetes.io/part-of: core-platform
      annotations:
        checksum/observability-config: {{ include (print $.Template.BasePath "/observability-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: vmalert
          image: {{ .Values.observability.images.vmalert | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - -rule=/etc/vmalert/rules.yml
            - -datasource.url=http://victoriametrics.observability.svc.cluster.local:8428
            - -datasource.basicAuth.username=$(OBSERVABILITY_VM_REMOTE_WRITE_USERNAME)
            - -datasource.basicAuth.password=$(OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD)
            - -notifier.url=http://alertmanager.observability.svc.cluster.local:9093
          envFrom:
            - secretRef:
                name: {{ .Values.observability.secretName }}
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert
              readOnly: true
          resources:
            {{- toYaml .Values.observability.resources.vmalert | nindent 12 }}
      volumes:
        - name: rules
          configMap:
            name: vmalert-rules
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert-logs
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert-logs
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vmalert-logs
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vmalert-logs
        app.kubernetes.io/part-of: core-platform
      annotations:
        checksum/observability-config: {{ include (print $.Template.BasePath "/observability-config.yaml") . | sha256sum }}
    spec:
      containers:
        - name: vmalert
          image: {{ .Values.observability.images.vmalert | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - -rule=/etc/vmalert/rules.yml
            - -datasource.url=http://victorialogs.observability.svc.cluster.local:9428
            - -datasource.basicAuth.username=$(OBSERVABILITY_VM_REMOTE_WRITE_USERNAME)
            - -datasource.basicAuth.password=$(OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD)
            - -notifier.url=http://alertmanager.observability.svc.cluster.local:9093
          envFrom:
            - secretRef:
                name: {{ .Values.observability.secretName }}
          volumeMounts:
            - name: rules
              mountPath: /etc/vmalert
              readOnly: true
          resources:
            {{- toYaml .Values.observability.resources.vmalert | nindent 12 }}
      volumes:
        - name: rules
          configMap:
            name: vmalert-log-rules
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-egress
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: telegram-egress
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: telegram-egress
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: telegram-egress
        app.kubernetes.io/part-of: core-platform
    spec:
      containers:
        - name: gluetun
          image: {{ .Values.observability.images.gluetun | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - NET_ADMIN
          env:
            - name: VPN_SERVICE_PROVIDER
              value: custom
            - name: VPN_TYPE
              value: wireguard
            - name: WIREGUARD_IMPLEMENTATION
              value: userspace
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            - name: HTTPPROXY_LOG
              value: "off"
            - name: HTTPPROXY_STEALTH
              value: "on"
            - name: FIREWALL_INPUT_PORTS
              value: "8888"
          ports:
            - name: http-proxy
              containerPort: 8888
          readinessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http-proxy
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: wireguard-config
              mountPath: /gluetun/wireguard/wg0.conf
              subPath: wg0.conf
              readOnly: true
            - name: dev-net-tun
              mountPath: /dev/net/tun
          resources:
            {{- toYaml .Values.observability.resources.telegramEgress | nindent 12 }}
      volumes:
        - name: wireguard-config
          secret:
            secretName: {{ .Values.observability.secretName }}
            defaultMode: 256
            items:
              - key: OBSERVABILITY_WIREGUARD_CONF
                path: wg0.conf
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-egress
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: telegram-egress
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: telegram-egress
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http-proxy
      port: 8888
      targetPort: http-proxy
---
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" .Values.observability.persistence.enabled }}
metadata:
  name: alertmanager
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: alertmanager
spec:
  {{- if .Values.observability.persistence.enabled }}
  serviceName: alertmanager
  {{- end }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/part-of: core-platform
      annotations:
        checksum/observability-config: {{ include (print $.Template.BasePath "/observability-config.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "9093"
    spec:
      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: alertmanager
          image: {{ .Values.observability.images.alertmanager | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
            - --log.level=error
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: secrets
              mountPath: /etc/alertmanager-secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
          resources:
            {{- toYaml .Values.observability.resources.alertmanager | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: alertmanager
        - name: secrets
          secret:
            secretName: {{ .Values.observability.secretName }}
            items:
              - key: OBSERVABILITY_TELEGRAM_BOT_TOKEN
                path: telegram-bot-token
        {{- if not .Values.observability.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
  {{- if .Values.observability.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.observability.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.observability.storage.alertmanager }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: alertmanager
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 9093
      targetPort: http
{{- end }}
