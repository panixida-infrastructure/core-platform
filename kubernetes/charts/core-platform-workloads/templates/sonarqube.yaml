{{- if .Values.sonarqube.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sonarqube
  namespace: {{ .Values.sonarqube.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: sonarqube
spec:
  serviceName: sonarqube
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sonarqube
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sonarqube
        app.kubernetes.io/part-of: core-platform
    spec:
      initContainers:
        - name: sysctl
          image: busybox:1.37
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - sh
            - -ec
            - sysctl -w vm.max_map_count=524288
          securityContext:
            privileged: true
            runAsUser: 0
      containers:
        - name: sonarqube
          image: {{ .Values.sonarqube.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          env:
            - name: SONAR_DB_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarqube.secretName }}
                  key: SONAR_DB_HOST
            - name: SONAR_DB_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarqube.secretName }}
                  key: SONAR_DB_PORT
            - name: SONAR_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarqube.secretName }}
                  key: SONAR_DB_NAME
            - name: SONAR_JDBC_URL
              value: jdbc:postgresql://$(SONAR_DB_HOST):$(SONAR_DB_PORT)/$(SONAR_DB_NAME)?sslmode=require
            - name: SONAR_JDBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarqube.secretName }}
                  key: SONAR_DB_USERNAME
            - name: SONAR_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarqube.secretName }}
                  key: SONAR_DB_PASSWORD
          ports:
            - name: http
              containerPort: 9000
          readinessProbe:
            httpGet:
              path: /api/system/status
              port: http
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 6
          volumeMounts:
            - name: sonarqube-data
              mountPath: /opt/sonarqube/data
              subPath: data
            - name: sonarqube-data
              mountPath: /opt/sonarqube/extensions
              subPath: extensions
            - name: sonarqube-data
              mountPath: /opt/sonarqube/logs
              subPath: logs
          resources:
            {{- toYaml .Values.sonarqube.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: sonarqube-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.sonarqube.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.sonarqube.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: sonarqube
  namespace: {{ .Values.sonarqube.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: sonarqube
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sonarqube
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 9000
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonarqube
  namespace: {{ .Values.sonarqube.namespace }}
spec:
  parentRefs:
    - name: {{ .Values.global.gateway.name }}
      namespace: {{ .Values.global.gateway.namespace }}
      sectionName: {{ .Values.global.gateway.httpSectionName }}
  hostnames:
    - {{ .Values.sonarqube.host }}
  rules:
    - backendRefs:
        - name: sonarqube
          port: 9000
{{- end }}
