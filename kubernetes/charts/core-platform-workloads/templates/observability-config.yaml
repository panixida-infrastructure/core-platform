{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: otel-collector
data:
  config.yml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      basicauth/victoria:
        client_auth:
          username: ${env:OBSERVABILITY_VM_REMOTE_WRITE_USERNAME}
          password: ${env:OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD}

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      prometheus/kubernetes:
        config:
          global:
            scrape_interval: 30s
            scrape_timeout: 10s
          scrape_configs:
            - job_name: kubernetes-nodes
              scheme: https
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              tls_config:
                insecure_skip_verify: true
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$$1/proxy/metrics
            - job_name: kubernetes-cadvisor
              scheme: https
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              tls_config:
                insecure_skip_verify: true
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: labelmap
                  regex: __meta_kubernetes_node_label_(.+)
                - target_label: __address__
                  replacement: kubernetes.default.svc:443
                - source_labels: [__meta_kubernetes_node_name]
                  regex: (.+)
                  target_label: __metrics_path__
                  replacement: /api/v1/nodes/$$1/proxy/metrics/cadvisor
            - job_name: linux-node-exporter
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_pod_label_app_kubernetes_io_name]
                  action: keep
                  regex: observability;node-exporter
                - source_labels: [__meta_kubernetes_pod_phase]
                  action: keep
                  regex: Running
                - source_labels: [__meta_kubernetes_pod_container_port_number]
                  action: keep
                  regex: "9100"
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: instance
                - source_labels: [__meta_kubernetes_pod_node_name]
                  target_label: kubernetes_node
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: kubernetes_pod_name
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: kubernetes_namespace
            - job_name: timeweb-dbaas-postgres
              scheme: https
              metrics_path: /${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_ID}/service/metrics
              basic_auth:
                username: ${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_USERNAME}
                password: ${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_PASSWORD}
              static_configs:
                - targets:
                    - dbs-exporter.timeweb.cloud
                  labels:
                    db_cluster: postgres
                    db_system: postgresql
                    provider: timeweb
              relabel_configs:
                - target_label: instance
                  replacement: managed-postgres
            - job_name: timeweb-dbaas-node
              scheme: https
              metrics_path: /${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_ID}/node-exporter/metrics
              basic_auth:
                username: ${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_USERNAME}
                password: ${env:OBSERVABILITY_TIMEWEB_DBAAS_EXPORTER_PASSWORD}
              static_configs:
                - targets:
                    - dbs-exporter.timeweb.cloud
                  labels:
                    db_cluster: postgres
                    db_system: postgresql
                    provider: timeweb
              relabel_configs:
                - target_label: instance
                  replacement: managed-postgres
            - job_name: kubernetes-pods
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $$1:$$2
                  target_label: __address__
                - action: labelmap
                  regex: __meta_kubernetes_pod_label_(.+)
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: kubernetes_namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: kubernetes_pod_name

      httpcheck/platform:
        collection_interval: 30s
        metrics:
          httpcheck.dns.lookup.duration:
            enabled: true
          httpcheck.client.connection.duration:
            enabled: true
          httpcheck.tls.handshake.duration:
            enabled: true
          httpcheck.client.request.duration:
            enabled: true
          httpcheck.response.duration:
            enabled: true
          httpcheck.tls.cert_remaining:
            enabled: true
          httpcheck.response.size:
            enabled: true
        targets:
          - method: GET
            endpoints:
              {{- range .Values.observability.httpCheckTargets }}
              - {{ . | quote }}
              {{- end }}

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      resource/core-platform:
        attributes:
          - key: platform.name
            value: core-platform
            action: upsert
      transform/logs:
        error_mode: ignore
        log_statements:
          - 'set(log.attributes["http.request.method"], log.attributes["Method"]) where log.attributes["http.request.method"] == nil and log.attributes["Method"] != nil'
          - 'set(log.attributes["url.path"], log.attributes["RequestPath"]) where log.attributes["url.path"] == nil and log.attributes["RequestPath"] != nil'
          - 'set(log.attributes["url.path"], log.attributes["Path"]) where log.attributes["url.path"] == nil and log.attributes["Path"] != nil'
          - 'set(log.attributes["http.response.status_code"], log.attributes["StatusCode"]) where log.attributes["http.response.status_code"] == nil and log.attributes["StatusCode"] != nil'
          - 'set(log.attributes["http.server.request.duration_ms"], log.attributes["ElapsedMs"]) where log.attributes["http.server.request.duration_ms"] == nil and log.attributes["ElapsedMs"] != nil'
          - 'set(log.attributes["aspnetcore.endpoint.display_name"], log.attributes["Endpoint"]) where log.attributes["aspnetcore.endpoint.display_name"] == nil and log.attributes["Endpoint"] != nil'
          - 'set(log.attributes["client.address"], log.attributes["RemoteIp"]) where log.attributes["client.address"] == nil and log.attributes["RemoteIp"] != nil'
          - 'set(log.attributes["user_agent.original"], log.attributes["UserAgent"]) where log.attributes["user_agent.original"] == nil and log.attributes["UserAgent"] != nil'
          - 'set(log.attributes["network.protocol.name"], log.attributes["Transport"]) where log.attributes["network.protocol.name"] == nil and log.attributes["Transport"] != nil'
          - 'set(log.attributes["aspnetcore.connection.id"], log.attributes["ConnectionId"]) where log.attributes["aspnetcore.connection.id"] == nil and log.attributes["ConnectionId"] != nil'
          - 'set(log.attributes["aspnetcore.request.id"], log.attributes["RequestId"]) where log.attributes["aspnetcore.request.id"] == nil and log.attributes["RequestId"] != nil'
          - 'delete_key(log.attributes, "Method") where log.attributes["http.request.method"] != nil'
          - 'delete_key(log.attributes, "RequestPath") where log.attributes["url.path"] != nil'
          - 'delete_key(log.attributes, "Path") where log.attributes["url.path"] != nil'
          - 'delete_key(log.attributes, "StatusCode") where log.attributes["http.response.status_code"] != nil'
          - 'delete_key(log.attributes, "ElapsedMs") where log.attributes["http.server.request.duration_ms"] != nil'
          - 'delete_key(log.attributes, "Endpoint") where log.attributes["aspnetcore.endpoint.display_name"] != nil'
          - 'delete_key(log.attributes, "RemoteIp") where log.attributes["client.address"] != nil'
          - 'delete_key(log.attributes, "UserAgent") where log.attributes["user_agent.original"] != nil'
          - 'delete_key(log.attributes, "Transport") where log.attributes["network.protocol.name"] != nil'
          - 'delete_key(log.attributes, "ConnectionId") where log.attributes["aspnetcore.connection.id"] != nil'
          - 'delete_key(log.attributes, "RequestId") where log.attributes["aspnetcore.request.id"] != nil'
          - 'delete_key(log.attributes, "TraceId")'
          - 'delete_key(log.attributes, "SpanId")'
          - 'delete_key(log.attributes, "ParentId")'
      batch:
        timeout: 5s
        send_batch_size: 8192

    exporters:
      otlphttp/victoriametrics:
        compression: gzip
        metrics_endpoint: http://victoriametrics.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
        auth:
          authenticator: basicauth/victoria
      otlphttp/victorialogs:
        compression: gzip
        logs_endpoint: http://victorialogs.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        headers:
          VL-Stream-Fields: service.name,deployment.environment,platform.name
        auth:
          authenticator: basicauth/victoria
      otlphttp/victoriatraces:
        compression: gzip
        traces_endpoint: http://victoriatraces.observability.svc.cluster.local:10428/insert/opentelemetry/v1/traces

    service:
      extensions: [health_check, basicauth/victoria]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
                    without_type_suffix: true
                    without_units: true
      pipelines:
        metrics:
          receivers: [otlp, prometheus/kubernetes, httpcheck/platform]
          processors: [memory_limiter, resource/core-platform, batch]
          exporters: [otlphttp/victoriametrics]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource/core-platform, transform/logs, batch]
          exporters: [otlphttp/victorialogs]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource/core-platform, batch]
          exporters: [otlphttp/victoriatraces]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert
data:
  rules.yml: |
    groups:
      - name: kubernetes-basic
        rules:
          - alert: KubernetesNodeDown
            expr: up{service_name="kubernetes-nodes"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node metrics are unavailable.
              description: Kubelet node metrics have been unavailable for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/core-platform-overview/core-platform-overview
          - alert: KubernetesCadvisorDown
            expr: up{service_name="kubernetes-cadvisor"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes cAdvisor metrics are unavailable.
              description: Kubelet cAdvisor container metrics have been unavailable for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/kubernetes-workloads/kubernetes-workloads
          - alert: LinuxNodeExporterDown
            expr: up{service_name="linux-node-exporter"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Linux node exporter metrics are unavailable.
              description: Host OS metrics from node-exporter have been unavailable for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/node-exporter/node-exporter
          - alert: PlatformEndpointDown
            expr: max by (http_url) (httpcheck_status{http_status_class="2xx"}) == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Platform endpoint is not reachable.
              description: One public platform endpoint has failed OpenTelemetry HTTP checks for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/core-platform-overview/core-platform-overview
          - alert: TimewebPostgresExporterDown
            expr: up{service_name="timeweb-dbaas-postgres"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Timeweb PostgreSQL exporter is unavailable.
              description: Managed PostgreSQL DB exporter metrics have been unavailable for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/postgresql-managed/postgresql-managed
          - alert: TimewebPostgresHostExporterDown
            expr: up{service_name="timeweb-dbaas-node"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Timeweb PostgreSQL host exporter is unavailable.
              description: Managed PostgreSQL host node exporter metrics have been unavailable for at least 5 minutes.
              dashboard_url: https://grafana.panixida.ru/d/node-exporter/node-exporter
          - alert: TimewebPostgresScrapeError
            expr: pg_exporter_last_scrape_error{service_name="timeweb-dbaas-postgres"} > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Managed PostgreSQL exporter scrape is failing.
              description: The PostgreSQL exporter reports scrape errors for the managed database.
              dashboard_url: https://grafana.panixida.ru/d/postgresql-managed/postgresql-managed
          - alert: TimewebPostgresDown
            expr: pg_up{service_name="timeweb-dbaas-postgres"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: Managed PostgreSQL is not reachable by exporter.
              description: The PostgreSQL exporter cannot reach the managed PostgreSQL instance.
              dashboard_url: https://grafana.panixida.ru/d/postgresql-managed/postgresql-managed
          - alert: TimewebPostgresHighConnectionUsage
            expr: 100 * sum(pg_stat_activity_count{service_name="timeweb-dbaas-postgres"}) / max(pg_settings_max_connections{service_name="timeweb-dbaas-postgres"}) > 80
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Managed PostgreSQL connection usage is high.
              description: PostgreSQL connection usage has stayed above 80 percent for at least 10 minutes.
              dashboard_url: https://grafana.panixida.ru/d/postgresql-managed/postgresql-managed
          - alert: KubernetesNodeHighCpu
            expr: 100 * (1 - avg by (k8s_node_name) (rate(node_cpu_seconds_total{service_name="linux-node-exporter",mode="idle"}[5m]))) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node CPU usage is high.
              description: Node CPU usage has stayed above 85 percent for at least 10 minutes.
              dashboard_url: https://grafana.panixida.ru/d/node-exporter/node-exporter
          - alert: KubernetesNodeHighMemory
            expr: 100 * (1 - (node_memory_MemAvailable_bytes{service_name="linux-node-exporter"} / node_memory_MemTotal_bytes{service_name="linux-node-exporter"})) > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node memory usage is high.
              description: Node memory usage has stayed above 90 percent for at least 10 minutes.
              dashboard_url: https://grafana.panixida.ru/d/node-exporter/node-exporter
          - alert: KubernetesNodeRootFilesystemHighUsage
            expr: 100 * (1 - (node_filesystem_avail_bytes{service_name="linux-node-exporter",mountpoint="/"} / node_filesystem_size_bytes{service_name="linux-node-exporter",mountpoint="/"})) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node root filesystem usage is high.
              description: Node root filesystem usage has stayed above 85 percent for at least 10 minutes.
              dashboard_url: https://grafana.panixida.ru/d/node-exporter/node-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-log-rules
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert-logs
data:
  rules.yml: |
    groups:
      - name: kubernetes-logs
        type: vlogs
        interval: 1m
        rules:
          - alert: KubernetesErrorLogs
            expr: 'error OR ERROR OR exception OR Exception OR fatal OR FATAL | stats count() as error_logs | filter error_logs:>0'
            labels:
              severity: warning
            annotations:
              summary: Error-like application logs were detected.
              description: VictoriaLogs found OTLP error-like log entries during the last evaluation window.
              logs_url: https://grafana.panixida.ru/explore?left=%7B%22datasource%22:%22victorialogs%22%7D
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: alertmanager
data:
  alertmanager.yml: |
    templates:
      - /etc/alertmanager/telegram.tmpl
    route:
      receiver: telegram
      group_by: ["alertname", "severity", "instance", "kubernetes_io_hostname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: telegram
        telegram_configs:
          - chat_id: {{ .Values.observability.alerts.telegram.chatId }}
            bot_token_file: /etc/alertmanager-secrets/telegram-bot-token
            send_resolved: true
            parse_mode: HTML
            message: '{{ "{{" }} template "telegram.panixida.message" . {{ "}}" }}'
            http_config:
              proxy_url: http://telegram-egress.observability.svc.cluster.local:8888
  telegram.tmpl: |
    {{ "{{" }} define "telegram.panixida.message" {{ "}}" -}}
    {{ "{{" }}- if gt (len .Alerts.Firing) 0 {{ "}}" -}}
    🔥 <b>Alerts Firing</b> 🔥
    {{ "{{" }}- else {{ "}}" -}}
    ✅ <b>Alerts Resolved</b> ✅
    {{ "{{" }}- end {{ "}}" }}

    {{ "{{" }}- range .Alerts {{ "}}" }}
    ---
    {{ "{{" }}- if eq .Status "firing" {{ "}}" }}🔥{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} <b>{{ "{{" }} .Labels.alertname {{ "}}" }}</b>
    {{ "{{" }}- with .Labels.severity {{ "}}" }}
    {{ "{{" }}- if eq . "critical" {{ "}}" }}🚨 CRITICAL 🚨{{ "{{" }} else if eq . "warning" {{ "}}" }}⚠️ WARNING{{ "{{" }} else {{ "}}" }}ℹ️ {{ "{{" }} . {{ "}}" }}{{ "{{" }} end {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- with .Annotations.summary {{ "}}" }}
    📝 {{ "{{" }} . {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- with .Annotations.description {{ "}}" }}
    📄 {{ "{{" }} . {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- with .Labels.instance {{ "}}" }}
    📍 <code>{{ "{{" }} . {{ "}}" }}</code>
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- with .Labels.kubernetes_io_hostname {{ "}}" }}
    🖥 <code>{{ "{{" }} . {{ "}}" }}</code>
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- if or .Annotations.dashboard_url .Annotations.logs_url {{ "}}" }}
    🛠 {{ "{{" }} with .Annotations.dashboard_url {{ "}}" }}<a href="{{ "{{" }} . {{ "}}" }}">Grafana</a>{{ "{{" }} end {{ "}}" }}{{ "{{" }} if and .Annotations.dashboard_url .Annotations.logs_url {{ "}}" }} | {{ "{{" }} end {{ "}}" }}{{ "{{" }} with .Annotations.logs_url {{ "}}" }}<a href="{{ "{{" }} . {{ "}}" }}">Logs</a>{{ "{{" }} end {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
    {{ "{{" }}- end {{ "}}" }}
{{- end }}
