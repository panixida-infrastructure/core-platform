{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmagent-scrape
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmagent
data:
  scrape.yml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s
    scrape_configs:
      - job_name: kubernetes-nodes
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics
      - job_name: kubernetes-cadvisor
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          insecure_skip_verify: true
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/$1/proxy/metrics/cadvisor
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
      - job_name: blackbox-platform
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
              {{- range .Values.observability.blackboxTargets }}
              - {{ . | quote }}
              {{- end }}
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: platform_endpoint
            replacement: "true"
          - target_label: __address__
            replacement: blackbox-exporter.observability.svc.cluster.local:9115
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: blackbox-exporter
data:
  blackbox.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          follow_redirects: true
          preferred_ip_protocol: ip4
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-rules
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert
data:
  rules.yml: |
    groups:
      - name: kubernetes-basic
        rules:
          - alert: KubernetesNodeDown
            expr: up{job="kubernetes-nodes"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node metrics are unavailable.
          - alert: PlatformEndpointDown
            expr: probe_success{job="blackbox-platform",instance=~"https://(argocd|grafana|identity|k8s|secrets)\\.panixida\\.ru"} == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: Platform endpoint is not reachable.
          - alert: KubernetesNodeHighCpu
            expr: 100 * sum by (kubernetes_io_hostname) (rate(container_cpu_usage_seconds_total{id="/"}[5m])) / sum by (kubernetes_io_hostname) (machine_cpu_cores) > 85
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node CPU usage is high.
          - alert: KubernetesNodeHighMemory
            expr: 100 * sum by (kubernetes_io_hostname) (container_memory_working_set_bytes{id="/"}) / sum by (kubernetes_io_hostname) (machine_memory_bytes) > 90
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: Kubernetes node memory usage is high.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: vmalert-log-rules
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: vmalert-logs
data:
  rules.yml: |
    groups:
      - name: kubernetes-logs
        type: vlogs
        interval: 1m
        rules:
          - alert: KubernetesErrorLogs
            expr: 'error OR ERROR OR exception OR Exception OR fatal OR FATAL | stats count() as error_logs | filter error_logs:>0'
            labels:
              severity: warning
            annotations:
              summary: Error-like Kubernetes logs were detected.
              description: VictoriaLogs found error-like log entries during the last evaluation window.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: alertmanager
data:
  alertmanager.yml: |
    route:
      receiver: telegram
      group_by: ["alertname", "severity", "instance", "kubernetes_io_hostname"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    receivers:
      - name: telegram
        telegram_configs:
          - chat_id: {{ .Values.observability.alerts.telegram.chatId }}
            bot_token_file: /etc/alertmanager-secrets/telegram-bot-token
            send_resolved: true
            http_config:
              proxy_url: http://telegram-egress.observability.svc.cluster.local:8888
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: otel-collector
data:
  config.yml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    exporters:
      otlphttp/victoriatraces:
        endpoint: http://victoriatraces.observability.svc.cluster.local:10428/insert/opentelemetry
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [otlphttp/victoriatraces]
{{- end }}
