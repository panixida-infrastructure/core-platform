{{- if .Values.observability.enabled }}
apiVersion: apps/v1
kind: {{ ternary "StatefulSet" "Deployment" .Values.observability.persistence.enabled }}
metadata:
  name: victoriametrics
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: victoriametrics
spec:
  {{- if .Values.observability.persistence.enabled }}
  serviceName: victoriametrics
  {{- end }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: victoriametrics
      app.kubernetes.io/part-of: core-platform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoriametrics
        app.kubernetes.io/part-of: core-platform
    spec:
      containers:
        - name: victoriametrics
          image: {{ .Values.observability.images.victoriametrics | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - -storageDataPath=/storage
            - -retentionPeriod=30d
            - -httpAuth.username=$(OBSERVABILITY_VM_REMOTE_WRITE_USERNAME)
            - -httpAuth.password=$(OBSERVABILITY_VM_REMOTE_WRITE_PASSWORD)
          envFrom:
            - secretRef:
                name: {{ .Values.observability.secretName }}
          ports:
            - name: http
              containerPort: 8428
          volumeMounts:
            - name: data
              mountPath: /storage
          resources:
            {{- toYaml .Values.observability.resources.victoriametrics | nindent 12 }}
      {{- if not .Values.observability.persistence.enabled }}
      volumes:
        - name: data
          emptyDir: {}
      {{- end }}
  {{- if .Values.observability.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.observability.storageClassName }}
        resources:
          requests:
            storage: {{ .Values.observability.storage.victoriametrics }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: victoriametrics
  namespace: {{ .Values.observability.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: victoriametrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: victoriametrics
    app.kubernetes.io/part-of: core-platform
  ports:
    - name: http
      port: 8428
      targetPort: http
---
