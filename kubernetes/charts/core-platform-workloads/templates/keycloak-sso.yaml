{{- if .Values.keycloak.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-sso-config
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
data:
  configure-sso.sh: |
    #!/usr/bin/env sh
    set -eu

    realm="panixida"
    keycloak_url="http://keycloak.identity.svc.cluster.local:8080"
    kc="/opt/keycloak/bin/kcadm.sh"

    "$kc" config credentials \
      --server "$keycloak_url" \
      --realm master \
      --user "$KEYCLOAK_ADMIN_USERNAME" \
      --password "$KEYCLOAK_ADMIN_PASSWORD" >/dev/null

    if ! "$kc" get "realms/${realm}" >/dev/null 2>&1; then
      "$kc" create realms -s realm="$realm" -s enabled=true >/dev/null
    fi

    ensure_group() {
      group_name="$1"
      if ! "$kc" get groups -r "$realm" --fields name --format csv \
        | tr -d '"' \
        | grep -Fx "$group_name" >/dev/null; then
        "$kc" create groups -r "$realm" -s name="$group_name" >/dev/null
      fi
    }

    group_uuid() {
      group_name="$1"
      "$kc" get groups -r "$realm" --fields id,name --format csv \
        | tr -d '"' \
        | while IFS=, read -r group_id current_group_name; do
            if [ "$current_group_name" = "$group_name" ]; then
              printf '%s\n' "$group_id"
              break
            fi
          done
    }

    user_uuid() {
      user_ref="$1"
      user_id="$("$kc" get users -r "$realm" -q "username=$user_ref" --fields id,username --format csv \
        | tr -d '"' \
        | while IFS=, read -r current_user_id current_username; do
            if [ "$current_username" = "$user_ref" ]; then
              printf '%s\n' "$current_user_id"
              break
            fi
          done)"
      if [ -n "$user_id" ]; then
        printf '%s\n' "$user_id"
        return
      fi

      "$kc" get users -r "$realm" -q "email=$user_ref" --fields id,email --format csv \
        | tr -d '"' \
        | while IFS=, read -r current_user_id current_email; do
            if [ "$current_email" = "$user_ref" ]; then
              printf '%s\n' "$current_user_id"
              break
            fi
          done
    }

    user_has_group() {
      user_id="$1"
      group_name="$2"
      "$kc" get "users/$user_id/groups" -r "$realm" --fields name,path --format csv \
        | tr -d '"' \
        | while IFS=, read -r current_group_name current_group_path; do
            if [ "$current_group_name" = "$group_name" ] || [ "$current_group_path" = "/$group_name" ]; then
              printf 'yes\n'
              break
            fi
          done
    }

    ensure_user_group() {
      user_ref="$1"
      group_name="$2"
      user_id="$(user_uuid "$user_ref")"
      group_id="$(group_uuid "$group_name")"

      if [ -z "$user_id" ]; then
        echo "Keycloak user '$user_ref' was not found in realm '$realm'; skipping $group_name membership" >&2
        return
      fi

      if [ -z "$group_id" ]; then
        echo "Keycloak group '$group_name' was not found in realm '$realm'" >&2
        exit 1
      fi

      if [ "$(user_has_group "$user_id" "$group_name")" = "yes" ]; then
        return
      fi

      "$kc" update "users/$user_id/groups/$group_id" -r "$realm" -n >/dev/null
    }

    client_uuid() {
      "$kc" get clients -r "$realm" -q "clientId=$1" --fields id --format csv \
        | tr -d '"' \
        | head -n1
    }

    delete_client() {
      client_id="$1"
      uuid="$(client_uuid "$client_id")"
      if [ -n "$uuid" ]; then
        "$kc" delete -r "$realm" "clients/$uuid" >/dev/null
      fi
    }

    mapper_uuid() {
      "$kc" get "clients/$1/protocol-mappers/models" -r "$realm" --fields id,name --format csv \
        | tr -d '"' \
        | while IFS=, read -r mapper_id mapper_name; do
            if [ "$mapper_name" = "groups" ]; then
              if [ -n "$mapper_id" ] && [ "$mapper_id" != "null" ]; then
                printf '%s\n' "$mapper_id"
              fi
              break
            fi
          done
    }

    ensure_groups_mapper() {
      uuid="$1"
      mapper_id="$(mapper_uuid "$uuid")"
      if [ -n "$mapper_id" ]; then
        cat >/tmp/groups-mapper.json <<EOF
    {
      "id": "$mapper_id",
      "name": "groups",
      "protocol": "openid-connect",
      "protocolMapper": "oidc-group-membership-mapper",
      "config": {
        "claim.name": "groups",
        "full.path": "false",
        "id.token.claim": "true",
        "access.token.claim": "true",
        "userinfo.token.claim": "true"
      }
    }
    EOF
      else
        cat >/tmp/groups-mapper.json <<'EOF'
    {
      "name": "groups",
      "protocol": "openid-connect",
      "protocolMapper": "oidc-group-membership-mapper",
      "config": {
        "claim.name": "groups",
        "full.path": "false",
        "id.token.claim": "true",
        "access.token.claim": "true",
        "userinfo.token.claim": "true"
      }
    }
    EOF
      fi
      if [ -n "$mapper_id" ]; then
        "$kc" update "clients/$uuid/protocol-mappers/models/$mapper_id" -r "$realm" -f /tmp/groups-mapper.json >/dev/null
      else
        "$kc" create "clients/$uuid/protocol-mappers/models" -r "$realm" -f /tmp/groups-mapper.json >/dev/null
      fi
      rm -f /tmp/groups-mapper.json
    }

    upsert_client() {
      client_id="$1"
      client_file="$2"
      uuid="$(client_uuid "$client_id")"
      if [ -n "$uuid" ]; then
        "$kc" update "clients/$uuid" -r "$realm" -f "$client_file" >/dev/null
      else
        "$kc" create clients -r "$realm" -f "$client_file" >/dev/null
        uuid="$(client_uuid "$client_id")"
      fi
    }

    upsert_oidc_client() {
      client_id="$1"
      client_file="$2"
      upsert_client "$client_id" "$client_file"
      uuid="$(client_uuid "$client_id")"
      ensure_groups_mapper "$uuid"
    }

    create_saml_sonarqube_client() {
      delete_client sonarqube

      cat >/tmp/sonarqube-client.json <<'EOF'
    {
      "clientId": "sonarqube",
      "name": "SonarQube",
      "protocol": "saml",
      "enabled": true,
      "publicClient": false,
      "frontchannelLogout": false,
      "redirectUris": ["https://sonar.panixida.ru/oauth2/callback/saml"],
      "baseUrl": "https://sonar.panixida.ru",
      "adminUrl": "https://sonar.panixida.ru",
      "attributes": {
        "saml.assertion.signature": "true",
        "saml.authnstatement": "true",
        "saml.client.signature": "false",
        "saml.encrypt": "false",
        "saml.force.post.binding": "true",
        "saml.force.name.id.format": "false",
        "saml.multivalued.roles": "false",
        "saml.onetimeuse.condition": "false",
        "saml.server.signature": "true",
        "saml.server.signature.keyinfo.ext": "false",
        "saml_name_id_format": "username"
      }
    }
    EOF

      "$kc" create clients -r "$realm" -f /tmp/sonarqube-client.json >/dev/null
      uuid="$(client_uuid sonarqube)"

      cat >/tmp/sonarqube-login-mapper.json <<'EOF'
    {
      "name": "Login",
      "protocol": "saml",
      "protocolMapper": "saml-user-property-mapper",
      "config": {
        "user.attribute": "username",
        "friendly.name": "login",
        "attribute.name": "login",
        "attribute.nameformat": "Basic"
      }
    }
    EOF
      "$kc" create "clients/$uuid/protocol-mappers/models" -r "$realm" -f /tmp/sonarqube-login-mapper.json >/dev/null

      cat >/tmp/sonarqube-name-mapper.json <<'EOF'
    {
      "name": "Name",
      "protocol": "saml",
      "protocolMapper": "saml-user-property-mapper",
      "config": {
        "user.attribute": "username",
        "friendly.name": "name",
        "attribute.name": "name",
        "attribute.nameformat": "Basic"
      }
    }
    EOF
      "$kc" create "clients/$uuid/protocol-mappers/models" -r "$realm" -f /tmp/sonarqube-name-mapper.json >/dev/null

      cat >/tmp/sonarqube-email-mapper.json <<'EOF'
    {
      "name": "Email",
      "protocol": "saml",
      "protocolMapper": "saml-user-property-mapper",
      "config": {
        "user.attribute": "email",
        "friendly.name": "email",
        "attribute.name": "email",
        "attribute.nameformat": "Basic"
      }
    }
    EOF
      "$kc" create "clients/$uuid/protocol-mappers/models" -r "$realm" -f /tmp/sonarqube-email-mapper.json >/dev/null

      cat >/tmp/sonarqube-groups-mapper.json <<'EOF'
    {
      "name": "Groups",
      "protocol": "saml",
      "protocolMapper": "saml-group-membership-mapper",
      "config": {
        "single": "true",
        "full.path": "false",
        "friendly.name": "groups",
        "attribute.name": "groups",
        "attribute.nameformat": "Basic"
      }
    }
    EOF
      "$kc" create "clients/$uuid/protocol-mappers/models" -r "$realm" -f /tmp/sonarqube-groups-mapper.json >/dev/null

      rm -f /tmp/sonarqube-client.json \
        /tmp/sonarqube-login-mapper.json \
        /tmp/sonarqube-name-mapper.json \
        /tmp/sonarqube-email-mapper.json \
        /tmp/sonarqube-groups-mapper.json
    }

    ensure_group platform-admins
    ensure_group platform-viewers

    for platform_admin_user in ${KEYCLOAK_PLATFORM_ADMIN_USERS:-}; do
      ensure_user_group "$platform_admin_user" platform-admins
    done

    for platform_viewer_user in ${KEYCLOAK_PLATFORM_VIEWER_USERS:-}; do
      ensure_user_group "$platform_viewer_user" platform-viewers
    done

    delete_client komodo
    delete_client panixida-edge
    delete_client traefik
    delete_client portainer

    cat >/tmp/argocd-client.json <<'EOF'
    {
      "clientId": "argocd",
      "name": "Argo CD",
      "protocol": "openid-connect",
      "enabled": true,
      "publicClient": true,
      "standardFlowEnabled": true,
      "directAccessGrantsEnabled": false,
      "redirectUris": ["https://argocd.panixida.ru/auth/callback"],
      "webOrigins": ["https://argocd.panixida.ru"],
      "attributes": {
        "pkce.code.challenge.method": "S256"
      }
    }
    EOF
    upsert_oidc_client argocd /tmp/argocd-client.json

    cat >/tmp/kubernetes-client.json <<EOF
    {
      "clientId": "kubernetes",
      "name": "Kubernetes API and Headlamp",
      "protocol": "openid-connect",
      "enabled": true,
      "publicClient": false,
      "secret": "$KUBERNETES_OIDC_CLIENT_SECRET",
      "standardFlowEnabled": true,
      "directAccessGrantsEnabled": false,
      "serviceAccountsEnabled": false,
      "redirectUris": [
        "https://headlamp.panixida.ru/oidc-callback",
        "http://localhost:8000",
        "http://localhost:18000",
        "http://127.0.0.1:8000",
        "http://127.0.0.1:18000"
      ],
      "webOrigins": ["https://headlamp.panixida.ru"]
    }
    EOF
    upsert_oidc_client kubernetes /tmp/kubernetes-client.json

    cat >/tmp/grafana-client.json <<EOF
    {
      "clientId": "grafana",
      "name": "Grafana",
      "protocol": "openid-connect",
      "enabled": true,
      "publicClient": false,
      "secret": "$GRAFANA_OIDC_CLIENT_SECRET",
      "standardFlowEnabled": true,
      "directAccessGrantsEnabled": false,
      "serviceAccountsEnabled": false,
      "redirectUris": ["https://grafana.panixida.ru/login/generic_oauth"],
      "webOrigins": ["https://grafana.panixida.ru"]
    }
    EOF
    upsert_oidc_client grafana /tmp/grafana-client.json

    cat >/tmp/openbao-client.json <<EOF
    {
      "clientId": "openbao",
      "name": "OpenBao",
      "protocol": "openid-connect",
      "enabled": true,
      "publicClient": false,
      "secret": "$OPENBAO_OIDC_CLIENT_SECRET",
      "standardFlowEnabled": true,
      "directAccessGrantsEnabled": false,
      "serviceAccountsEnabled": false,
      "redirectUris": [
        "https://secrets.panixida.ru/ui/vault/auth/oidc/oidc/callback",
        "http://localhost:8250/oidc/callback"
      ],
      "webOrigins": ["https://secrets.panixida.ru"]
    }
    EOF
    upsert_oidc_client openbao /tmp/openbao-client.json

    create_saml_sonarqube_client

    rm -f /tmp/argocd-client.json /tmp/kubernetes-client.json /tmp/grafana-client.json /tmp/openbao-client.json
---
apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-sso-configure
  namespace: {{ .Values.keycloak.namespace }}
  labels:
    {{- include "core-platform-workloads.labels" . | nindent 4 }}
    app.kubernetes.io/name: keycloak
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "10"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keycloak-sso-configure
        app.kubernetes.io/part-of: core-platform
    spec:
      restartPolicy: OnFailure
      containers:
        - name: keycloak-sso-configure
          image: {{ .Values.keycloak.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command:
            - /bin/sh
            - /config/configure-sso.sh
          env:
            - name: KEYCLOAK_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.keycloak.secretName }}
                  key: KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD
            - name: GRAFANA_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-sso-client-secrets
                  key: GRAFANA_OIDC_CLIENT_SECRET
            - name: OPENBAO_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-sso-client-secrets
                  key: OPENBAO_OIDC_CLIENT_SECRET
            - name: KUBERNETES_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-sso-client-secrets
                  key: KUBERNETES_OIDC_CLIENT_SECRET
            - name: KEYCLOAK_PLATFORM_ADMIN_USERS
              value: {{ .Values.keycloak.sso.adminUsers | default (list "admin") | join " " | quote }}
            - name: KEYCLOAK_PLATFORM_VIEWER_USERS
              value: {{ .Values.keycloak.sso.viewerUsers | default (list) | join " " | quote }}
          volumeMounts:
            - name: keycloak-sso-config
              mountPath: /config
              readOnly: true
      volumes:
        - name: keycloak-sso-config
          configMap:
            name: keycloak-sso-config
            defaultMode: 0555
{{- end }}
