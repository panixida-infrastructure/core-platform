global:
  imagePullPolicy: IfNotPresent
  gateway:
    name: core-platform
    namespace: envoy-gateway-system
    httpSectionName: http

keycloak:
  enabled: true
  namespace: identity
  host: identity.panixida.ru
  image: quay.io/keycloak/keycloak:26.6.2
  secretName: keycloak-secrets
  replicas: 1
  cache:
    type: local
    stack: ""
  jgroupsCleanup:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

openbao:
  enabled: true
  namespace: secrets
  host: secrets.panixida.ru
  image: openbao/openbao:2.5.4
  secretName: openbao-secrets
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

grafana:
  enabled: true
  namespace: observability
  host: grafana.panixida.ru
  image: grafana/grafana-oss:13.0.1
  secretName: grafana-secrets
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 768Mi

sonarqube:
  enabled: false
  namespace: quality
  host: sonar.panixida.ru
  image: sonarqube:community
  secretName: sonarqube-secrets
  javaOpts:
    web: -Xms128m -Xmx384m
    ce: -Xms128m -Xmx384m
    search: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=128m
  persistence:
    enabled: false
  storageClassName: nvme.network-drives.csi.timeweb.cloud
  storageSize: 10Gi
  resources:
    requests:
      cpu: 500m
      memory: 1400Mi
    limits:
      memory: 1792Mi

observability:
  enabled: true
  namespace: observability
  secretName: observability-secrets
  persistence:
    enabled: false
  storageClassName: nvme.network-drives.csi.timeweb.cloud
  hosts:
    metrics: metrics.panixida.ru
    logs: logs.panixida.ru
    traces: traces.panixida.ru
    alerts: alerts.panixida.ru
  blackboxTargets:
    - https://argocd.panixida.ru
    - https://headlamp.panixida.ru
    - https://identity.panixida.ru
    - https://secrets.panixida.ru
    - https://grafana.panixida.ru
    - https://metrics.panixida.ru
    - https://logs.panixida.ru
    - https://traces.panixida.ru
    - https://alerts.panixida.ru
  images:
    victoriametrics: victoriametrics/victoria-metrics:v1.143.0
    victorialogs: victoriametrics/victoria-logs:v1.50.0
    victoriatraces: victoriametrics/victoria-traces:v0.9.0
    vmagent: victoriametrics/vmagent:v1.143.0
    vlagent: victoriametrics/vlagent:v1.50.0
    vmalert: victoriametrics/vmalert:v1.143.0
    alertmanager: prom/alertmanager:v0.32.1
    blackboxExporter: prom/blackbox-exporter:v0.28.0
    otelCollector: otel/opentelemetry-collector-contrib:0.142.0
  storage:
    victoriametrics: 20Gi
    victorialogs: 10Gi
    victoriatraces: 10Gi
    alertmanager: 2Gi
  resources:
    victoriametrics:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 768Mi
    victorialogs:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    victoriatraces:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    vmagent:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
    vlagent:
      requests:
        cpu: 50m
        memory: 96Mi
      limits:
        memory: 256Mi
    vmalert:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    alertmanager:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    blackboxExporter:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 128Mi
    otelCollector:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
