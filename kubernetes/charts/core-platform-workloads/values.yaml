global:
  imagePullPolicy: IfNotPresent
  gateway:
    name: core-platform
    namespace: envoy-gateway-system
    httpSectionName: http
    httpsSectionNames:
      identity: identity-https
      secrets: secrets-https
      grafana: grafana-https
      sonar: sonar-https

keycloak:
  enabled: true
  namespace: identity
  host: identity.panixida.ru
  image: quay.io/keycloak/keycloak:26.6.2
  secretName: keycloak-secrets
  replicas: 1
  sso:
    adminUsers:
      - admin
    viewerUsers: []
  cache:
    type: local
    stack: ""
  jgroupsCleanup:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

openbao:
  enabled: true
  namespace: secrets
  host: secrets.panixida.ru
  image: openbao/openbao:2.5.4
  secretName: openbao-secrets
  staticSeal:
    enabled: true
    secretName: openbao-static-seal
    key: OPENBAO_STATIC_SEAL_KEY
    currentKeyId: static-20260613-1
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 512Mi

grafana:
  enabled: true
  namespace: observability
  host: grafana.panixida.ru
  image: grafana/grafana-oss:13.0.2
  secretName: grafana-secrets
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 768Mi

sonarqube:
  enabled: false
  namespace: quality
  host: sonar.panixida.ru
  image: sonarqube:26.5.0.122743-community
  secretName: sonarqube-secrets
  javaOpts:
    web: -Xms128m -Xmx384m
    ce: -Xms128m -Xmx384m
    search: -Xms512m -Xmx512m -XX:MaxDirectMemorySize=128m
  persistence:
    enabled: false
  storageClassName: nvme.network-drives.csi.timeweb.cloud
  storageSize: 10Gi
  resources:
    requests:
      cpu: 500m
      memory: 1400Mi
    limits:
      memory: 1792Mi

observability:
  enabled: true
  namespace: observability
  secretName: observability-secrets
  nodeExporter:
    enabled: true
  persistence:
    enabled: true
  storageClassName: nvme.network-drives.csi.timeweb.cloud
  httpCheckTargets:
    - https://argocd.panixida.ru
    - https://k8s.panixida.ru
    - https://kargo.panixida.ru
    - https://identity.panixida.ru
    - https://secrets.panixida.ru
    - https://grafana.panixida.ru
    - https://dev.api.dotnet-template.panixida.ru/health
    - https://api.dotnet-template.panixida.ru/health
  alerts:
    telegram:
      chatId: "-1003738995665"
  images:
    victoriametrics: victoriametrics/victoria-metrics:v1.143.0
    victorialogs: victoriametrics/victoria-logs:v1.50.0
    victoriatraces: victoriametrics/victoria-traces:v0.9.0
    vmalert: victoriametrics/vmalert:v1.143.0
    alertmanager: prom/alertmanager:v0.32.1
    nodeExporter: quay.io/prometheus/node-exporter:v1.11.1
    gluetun: ghcr.io/qdm12/gluetun:v3.40.0
    otelCollector: otel/opentelemetry-collector-contrib:0.142.0
  storage:
    victoriametrics: 20Gi
    victorialogs: 10Gi
    victoriatraces: 10Gi
    alertmanager: 2Gi
  resources:
    victoriametrics:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 768Mi
    victorialogs:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    victoriatraces:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi
    vmalert:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    alertmanager:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 256Mi
    nodeExporter:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        memory: 128Mi
    telegramEgress:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        memory: 256Mi
    otelCollector:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 768Mi
