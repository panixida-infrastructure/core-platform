apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-workloads
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/panixida-infrastructure/core-platform.git
    targetRevision: main
    path: kubernetes/charts/core-platform-workloads
    helm:
      releaseName: platform-workloads
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
