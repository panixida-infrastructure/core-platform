apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dotnet-template-development
  namespace: argocd
  labels:
    app.kubernetes.io/name: dotnet-template
    app.kubernetes.io/part-of: dotnet-template
    environment: development
  annotations:
    kargo.akuity.io/authorized-stage: dotnet-template:development
spec:
  project: default
  sources:
    - repoURL: https://github.com/panixida-infrastructure/ci-cd.git
      targetRevision: main
      path: charts/application
      helm:
        releaseName: dotnet-template-development
        valueFiles:
          - $values/deploy/helm/dotnet-template/values.yaml
          - $values/deploy/helm/dotnet-template/values-development.yaml
          - $values/deploy/helm/dotnet-template/images-development.yaml
    - repoURL: https://github.com/panixida-templates/dotnet-backend-template.git
      targetRevision: development
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: dotnet-template-development
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
