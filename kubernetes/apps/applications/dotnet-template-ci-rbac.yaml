apiVersion: v1
kind: Namespace
metadata:
  name: dotnet-template-development
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-actions-dotnet-template
  namespace: dotnet-template-development
---
apiVersion: v1
kind: Secret
metadata:
  name: github-actions-dotnet-template-token
  namespace: dotnet-template-development
  annotations:
    kubernetes.io/service-account.name: github-actions-dotnet-template
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: github-actions-dotnet-template-secrets
  namespace: dotnet-template-development
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - create
      - patch
      - update
  - apiGroups:
      - apps
    resources:
      - deployments
    verbs:
      - get
      - patch
      - list
      - watch
  - apiGroups:
      - apps
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: github-actions-dotnet-template-secrets
  namespace: dotnet-template-development
subjects:
  - kind: ServiceAccount
    name: github-actions-dotnet-template
    namespace: dotnet-template-development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: github-actions-dotnet-template-secrets
