apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: admin@panixida.ru
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: core-platform
                namespace: envoy-gateway-system
                kind: Gateway
                sectionName: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-panixida-ru
  namespace: envoy-gateway-system
spec:
  secretName: argocd-panixida-ru-tls
  dnsNames:
    - argocd.panixida.ru
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: headlamp-panixida-ru
  namespace: envoy-gateway-system
spec:
  secretName: headlamp-panixida-ru-tls
  dnsNames:
    - headlamp.panixida.ru
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
