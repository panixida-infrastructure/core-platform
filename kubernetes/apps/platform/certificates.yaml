apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-production
spec:
  acme:
    email: admin@panixida.ru
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-production
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: core-platform
                namespace: envoy-gateway-system
                kind: Gateway
                sectionName: http
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: identity-panixida-ru
  namespace: envoy-gateway-system
spec:
  secretName: identity-panixida-ru-tls
  dnsNames:
    - identity.panixida.ru
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: secrets-panixida-ru
  namespace: envoy-gateway-system
spec:
  secretName: secrets-panixida-ru-tls
  dnsNames:
    - secrets.panixida.ru
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
---
