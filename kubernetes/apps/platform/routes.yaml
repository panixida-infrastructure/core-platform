apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: core-platform
      namespace: envoy-gateway-system
      sectionName: http
    - name: core-platform
      namespace: envoy-gateway-system
      sectionName: argocd-https
  hostnames:
    - argocd.panixida.ru
  rules:
    - backendRefs:
        - name: argo-cd-argocd-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: headlamp
  namespace: headlamp
spec:
  parentRefs:
    - name: core-platform
      namespace: envoy-gateway-system
      sectionName: http
    - name: core-platform
      namespace: envoy-gateway-system
      sectionName: headlamp-https
  hostnames:
    - headlamp.panixida.ru
  rules:
    - backendRefs:
        - name: headlamp
          port: 80
