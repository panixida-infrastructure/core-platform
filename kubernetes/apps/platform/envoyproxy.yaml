apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: core-platform-proxy
  namespace: envoy-gateway-system
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyService:
        externalTrafficPolicy: Cluster
        patch:
          type: StrategicMerge
          value:
            metadata:
              annotations:
                k8s.timeweb.cloud/attached-loadbalancer-ssl: "true"
                k8s.timeweb.cloud/attached-loadbalancer-ssl-fqdn: "argocd.panixida.ru"
            spec:
              ports:
                - name: https-443
                  port: 443
                  appProtocol: k8s.timeweb.cloud/proto-https
                - name: http-80
                  port: 80
                  appProtocol: k8s.timeweb.cloud/proto-tcp
