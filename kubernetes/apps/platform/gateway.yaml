apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: core-platform-proxy
    namespace: envoy-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: core-platform
  namespace: envoy-gateway-system
spec:
  gatewayClassName: envoy
  listeners:
    - name: argocd-https
      protocol: HTTPS
      port: 443
      hostname: "argocd.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: argocd-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      hostname: "*.panixida.ru"
      allowedRoutes:
        namespaces:
          from: All
    - name: identity-https
      protocol: HTTPS
      port: 443
      hostname: "identity.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: identity-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: secrets-https
      protocol: HTTPS
      port: 443
      hostname: "secrets.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: secrets-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: grafana-https
      protocol: HTTPS
      port: 443
      hostname: "grafana.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: grafana-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: k8s-https
      protocol: HTTPS
      port: 443
      hostname: "k8s.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: k8s-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: sonar-https
      protocol: HTTPS
      port: 443
      hostname: "sonar.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: sonar-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: api-dotnet-template-https
      protocol: HTTPS
      port: 443
      hostname: "api.dotnet-template.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-dotnet-template-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
    - name: api-dev-dotnet-template-https
      protocol: HTTPS
      port: 443
      hostname: "dev.api.dotnet-template.panixida.ru"
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-dev-dotnet-template-panixida-ru-tls
      allowedRoutes:
        namespaces:
          from: All
