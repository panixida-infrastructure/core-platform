server:
  service:
    type: ClusterIP

dex:
  enabled: false

configs:
  params:
    server.insecure: true
    reposerver.git.request.timeout: 60s
  cm:
    url: https://argocd.panixida.ru
    oidc.config: |
      name: Keycloak
      issuer: https://identity.panixida.ru/realms/panixida
      clientID: argocd
      requestedScopes: ["openid", "profile", "email"]
      enablePKCEAuthentication: true
  rbac:
    policy.default: role:readonly
    scopes: '[groups]'
    policy.csv: |
      g, platform-admins, role:admin
      g, /platform-admins, role:admin
      g, oidc:platform-admins, role:admin

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  livenessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
