apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/panixida-infrastructure/core-platform.git
    targetRevision: main
    path: kubernetes/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
